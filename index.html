<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skjaldborg — Threat Modeling</title>
<style>
/* ============================================================
   Skjaldborg — Purple-Team Threat Modeling Studio
   Self-contained. Zero dependencies. Raccoon-flavoured.
   Design system inherited from RaccoonIR.
   ============================================================ */
:root{
  --bg-0:#0a0a0f;
  --bg-1:#0d0d12;
  --bg-2:#16161e;
  --bg-3:#1e1e2a;
  --bg-4:#252533;
  --txt-0:#e0e0ec;
  --txt-1:#8888a8;
  --txt-2:#555570;
  --accent:#a855f7;
  --accent-hi:#c084fc;
  --accent-lo:#7c3aed;
  --cyan:#38bdf8;
  --cyan-hi:#7dd3fc;
  --border:#2a2a3a;
  --border-hi:#3a3a50;
  --ok:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
  /* boundary semantics */
  --offense:#ef4444;       /* attack vectors / MITRE ATT&CK */
  --offense-glow:#ff6b6b;
  --trust:#38bdf8;         /* trust boundary / MITRE D3FEND – force field */
  --trust-glow:#7dd3fc;
  --privacy:#22c55e;       /* data protection / PII */
  --privacy-glow:#4ade80;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code','SF Mono',Consolas,'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--mono);
  font-size:13px;
  color:var(--txt-0);
  background:var(--bg-1);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:var(--bg-1)}
::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hi)}

/* ---------- App shell ---------- */
#app{display:grid;grid-template-columns:236px 1fr;height:100vh;width:100vw}

/* ---------- Sidebar ---------- */
#sidebar{
  background:var(--bg-0);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.brand{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:18px 12px 14px;
  border-bottom:1px solid var(--border);
  text-align:center;
}
.brand .logo{width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 0 12px #a855f7aa) drop-shadow(0 0 4px #a855f760)}
.brand h1{font-size:15px;font-weight:700;letter-spacing:.5px;color:var(--txt-0);margin:0}
.brand h1 span{color:var(--accent)}
.brand .tag{font-size:8.5px;color:var(--txt-2);letter-spacing:1.2px;text-transform:uppercase}
.side-scroll{flex:1;overflow-y:auto;padding:10px 10px 30px}
.side-group{margin-bottom:6px}
.side-label{
  font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--txt-2);padding:12px 8px 6px;font-weight:600;
  display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
}
.side-label:hover{color:var(--txt-1)}
.side-label .caret{font-size:7px;width:9px;display:inline-block;transition:.15s;color:var(--txt-2)}
.side-label.collapsed .caret{transform:rotate(-90deg)}
.side-label .grp-count{margin-left:auto;font-size:9px;letter-spacing:0;background:var(--bg-2);color:var(--txt-2);padding:1px 7px;border-radius:9px;font-weight:600}
.pal-search{position:sticky;top:0;background:var(--bg-0);padding:2px 2px 8px;z-index:6}
.pal-search .search-box{margin-bottom:0}
.pal-empty{color:var(--txt-2);font-size:11px;text-align:center;padding:20px 10px;line-height:1.6}
.sub-label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
  font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--txt-2);font-weight:600;
  padding:7px 8px 4px 14px;margin:3px 0 0 4px;border-left:2px solid var(--border)}
.sub-label:hover{color:var(--accent-hi);border-left-color:var(--accent)}
.sub-label .caret{font-size:7px;width:9px;display:inline-block;transition:.15s;color:var(--txt-2)}
.sub-label.collapsed .caret{transform:rotate(-90deg)}
.sub-items{margin-left:10px;border-left:1px solid var(--border);padding-left:3px}
.palette-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 9px;margin:2px 0;border-radius:7px;
  border:1px solid transparent;
  color:var(--txt-1);font-size:12px;
  cursor:grab;user-select:none;transition:.12s;
  position:relative;
}
.palette-item:hover{background:var(--bg-2);color:var(--txt-0);border-color:var(--border)}
.palette-item.armed{background:var(--bg-3);border-color:var(--accent);color:var(--txt-0);
  box-shadow:0 0 0 1px var(--accent),0 0 14px -4px var(--accent)}
.palette-item .pi-icon{width:24px;height:24px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.palette-item .pi-icon svg{width:20px;height:20px}
.palette-item .pi-text{display:flex;flex-direction:column;line-height:1.25;overflow:hidden}
.palette-item .pi-text small{font-size:9px;color:var(--txt-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.palette-item .dot{position:absolute;right:9px;top:9px;width:6px;height:6px;border-radius:50%}

/* nav items (views) */
.nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 9px;margin:2px 0;
  border-radius:7px;color:var(--txt-1);font-size:12px;cursor:pointer;transition:.12s;
}
.nav-item:hover{background:var(--bg-2);color:var(--txt-0)}
.nav-item.active{background:var(--bg-3);color:var(--accent-hi)}
.nav-item svg{width:16px;height:16px}

/* ---------- Main column ---------- */
#main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-1)}
header.topbar{
  height:64px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
}
.topbar .ttl h2{font-size:17px;font-weight:700}
.topbar .ttl p{font-size:11px;color:var(--txt-1);margin-top:2px}
.topbar .actions{display:flex;align-items:center;gap:8px}
.tbtn{
  background:var(--bg-3);border:1px solid var(--border-hi);color:var(--txt-1);
  padding:7px 12px;border-radius:7px;font-size:11.5px;display:flex;align-items:center;gap:6px;transition:.12s;
}
.tbtn:hover{background:var(--bg-4);color:var(--txt-0);border-color:var(--accent)}
.tbtn svg{width:14px;height:14px}
.tbtn.primary{background:var(--accent-lo);border-color:var(--accent);color:#fff}
.tbtn.primary:hover{background:var(--accent)}
.tbtn.ghost{background:transparent;border-color:transparent}
.user-chip{display:none}
.user-chip .av{display:none}

/* context menu */
#ctx-menu{position:fixed;z-index:500;min-width:180px;background:var(--bg-3);border:1px solid var(--border-hi);border-radius:10px;padding:5px 0;box-shadow:0 12px 40px -8px rgba(0,0,0,.6);display:none;backdrop-filter:blur(8px)}
#ctx-menu.show{display:block}
#ctx-menu .ctx-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:11.5px;color:var(--txt-0);cursor:pointer;transition:.1s}
#ctx-menu .ctx-item:hover{background:var(--accent-lo);color:#fff}
#ctx-menu .ctx-item .ctx-key{margin-left:auto;font-size:9.5px;color:var(--txt-2);font-family:var(--mono)}
#ctx-menu .ctx-sep{height:1px;background:var(--border);margin:4px 8px}
#ctx-menu .ctx-item.danger{color:#f87171}
#ctx-menu .ctx-item.danger:hover{background:rgba(239,68,68,.15)}

/* lock badge on boundary */
.bnd-lock{cursor:pointer;opacity:.7;transition:opacity .15s}
.bnd-lock:hover{opacity:1}
.bnd-lock circle{transition:r .15s}
.bnd-lock:hover circle{r:12}

/* ---------- Canvas region ---------- */
#stage{flex:1;display:flex;overflow:hidden;position:relative}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg-1)}
#hint{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(22,22,30,.85);border:1px solid var(--border);backdrop-filter:blur(6px);
  padding:8px 16px;border-radius:20px;font-size:11px;color:var(--txt-1);z-index:20;
  pointer-events:none;transition:opacity .3s;max-width:80%;text-align:center;
}
#hint b{color:var(--accent-hi)}
svg#canvas{width:100%;height:100%;display:block;cursor:default;touch-action:none}
svg#canvas.connect-mode{cursor:crosshair}
svg#canvas.panning{cursor:grabbing}

/* node text */
.node-label{font:600 12px var(--mono);fill:var(--txt-0);text-anchor:middle;pointer-events:none;paint-order:stroke;stroke:var(--bg-1);stroke-width:3px}
.node-sub{font:10px var(--mono);fill:var(--txt-2);text-anchor:middle;pointer-events:none}
.node-badge{font:700 9px var(--mono);fill:#fff}
.edge-label{font:10px var(--mono);fill:var(--txt-1);text-anchor:middle;paint-order:stroke;stroke:var(--bg-1);stroke-width:4px}
.bnd-label{font:700 11px var(--mono);text-transform:uppercase;letter-spacing:1px}

.node{cursor:grab}
.node.dragging{cursor:grabbing}
.node .hit{fill:transparent}
.flow{cursor:pointer}
.flow.sel,.node.sel .ring{filter:drop-shadow(0 0 6px var(--accent))}

/* zoom controls */
.zoom-controls{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:15}
.zoom-controls button,.minimap-toggle{
  width:34px;height:34px;border-radius:8px;background:var(--bg-2);border:1px solid var(--border-hi);
  color:var(--txt-1);font-size:16px;display:flex;align-items:center;justify-content:center;transition:.12s}
.zoom-controls button:hover{background:var(--bg-3);color:var(--txt-0);border-color:var(--accent)}
.zoom-lvl{font-size:10px;text-align:center;color:var(--txt-2)}

/* ---------- Properties / inspector ---------- */
#inspector{
  width:320px;flex:0 0 auto;background:var(--bg-0);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.insp-tabs{display:flex;border-bottom:1px solid var(--border)}
.insp-tabs button{
  flex:1;background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--txt-1);padding:11px 4px;font-size:11px;transition:.12s}
.insp-tabs button.active{color:var(--accent-hi);border-bottom-color:var(--accent)}
.insp-tabs button:hover{color:var(--txt-0)}
.insp-body{flex:1;overflow-y:auto;padding:14px}
.empty-note{color:var(--txt-2);font-size:11.5px;text-align:center;padding:40px 16px;line-height:1.6}
.empty-note svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--txt-2);margin-bottom:5px}
.field input[type=text],.field textarea,.field select{
  width:100%;background:var(--bg-2);border:1px solid var(--border-hi);color:var(--txt-0);
  border-radius:6px;padding:8px 9px;font-family:inherit;font-size:12px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:54px}
.sec-title{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--txt-1);
  margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.sec-title .pill{margin-left:auto;font-size:9px;padding:1px 7px;border-radius:10px;background:var(--bg-3);color:var(--txt-2)}
/* Inspector resize handle */
#insp-resizer{
  width:5px;flex:0 0 5px;cursor:col-resize;background:var(--border);
  transition:background .15s;position:relative;z-index:20;
}
#insp-resizer:hover,#insp-resizer.dragging{background:var(--accent)}
/* Collapsible inspector sections */
.sec-title{cursor:pointer;user-select:none}
.sec-title:hover{color:var(--txt-0)}
.sec-caret{margin-left:auto;font-size:9px;opacity:.5;flex-shrink:0;transition:opacity .12s}
.sec-title:hover .sec-caret{opacity:.9}
.sec-body-wrap{overflow:hidden;transition:none}
/* Variant / product selector */
.variant-select{width:100%;background:var(--bg-2);border:1px solid var(--border-hi);color:var(--txt-0);
  border-radius:6px;padding:8px 9px;font-family:inherit;font-size:12px;outline:none;cursor:pointer}
.variant-select:focus{border-color:var(--accent)}
.variant-badge{display:inline-block;margin-top:6px;padding:3px 10px 4px;border-radius:12px;
  font-size:11px;font-weight:600;border:1px solid;opacity:.9}
/* Analysis view interactive styles */
.an-row.clickable{cursor:pointer;border-radius:5px;padding:3px 5px;margin:0 -5px;transition:background .12s}
.an-row.clickable:hover{background:var(--bg-3)}
.an-row.clickable:hover span{color:var(--accent-hi)}
.an-exp-btn{background:none;border:none;color:var(--txt-2);cursor:pointer;font-size:10px;
  padding:2px 6px;border-radius:4px;transition:background .12s;float:right;margin-top:-1px}
.an-exp-btn:hover{background:var(--bg-3);color:var(--txt-0)}
.an-detail{font-size:10.5px;color:var(--txt-2);padding:6px 0 2px;border-top:1px dashed var(--border);margin-top:6px}
.an-detail .an-row{margin:2px 0}
.finding{border-radius:7px;padding:8px 10px;margin-bottom:7px;border:1px solid;font-size:11px;line-height:1.5}
.finding.crit{border-color:#ef444440;background:#ef44440a;color:#fca5a5}
.finding.warn{border-color:#f59e0b40;background:#f59e0b0a;color:#fcd34d}
.finding.info{border-color:#38bdf840;background:#38bdf80a;color:#7dd3fc}
.finding.ok{border-color:#22c55e40;background:#22c55e0a;color:#86efac}
.finding b{font-weight:700}
.finding .find-act{display:inline-block;margin-top:5px;padding:2px 8px;border-radius:4px;
  border:1px solid currentColor;cursor:pointer;font-size:10px;opacity:.8;transition:opacity .12s}
.finding .find-act:hover{opacity:1}
.stride-bar{height:5px;border-radius:3px;overflow:hidden;background:var(--bg-3);margin-top:3px}
.stride-bar-fill{height:100%;border-radius:3px}
.chk{display:flex;align-items:flex-start;gap:8px;padding:7px;border-radius:6px;cursor:pointer;font-size:11.5px;transition:.1s}
.chk:hover{background:var(--bg-2)}
.chk input{margin-top:2px;accent-color:var(--accent)}
.chk .ck-txt{flex:1}
.chk .ck-txt b{color:var(--txt-0)}
.chk .ck-txt small{display:block;color:var(--txt-2);font-size:10px;margin-top:1px;line-height:1.4}
.chk .ck-tag{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700;flex:0 0 auto}
.tag-S{background:#7c3aed33;color:#c4a5ff}
.tag-T{background:#0ea5e933;color:#7dd3fc}
.tag-R{background:#f59e0b33;color:#fcd34d}
.tag-I{background:#ef444433;color:#fca5a5}
.tag-D{background:#22c55e33;color:#86efac}
.tag-E{background:#ec489933;color:#f9a8d4}
.mini-list{max-height:190px;overflow-y:auto;border:1px solid var(--border);border-radius:7px;background:var(--bg-1)}
.mini-list .grp{font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent-hi);padding:7px 9px 3px;position:sticky;top:0;background:var(--bg-1)}
.mtopt{display:flex;gap:8px;align-items:flex-start;padding:6px 9px;font-size:11px;cursor:pointer}
.mopt:hover,.mtopt:hover{background:var(--bg-2)}
.mtopt{display:flex;gap:8px;align-items:flex-start;padding:6px 9px;font-size:11px;cursor:pointer}
.mtopt input{margin-top:2px;accent-color:var(--cyan)}
.mtopt small{color:var(--txt-2);display:block}
.mtopt code{color:var(--txt-1);font-size:10px}
.search-box{width:100%;background:var(--bg-2);border:1px solid var(--border-hi);color:var(--txt-0);
  border-radius:6px;padding:7px 9px;font-family:inherit;font-size:11px;margin-bottom:6px;outline:none}
.search-box:focus{border-color:var(--cyan)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{font-size:10px;padding:3px 8px;border-radius:12px;display:flex;align-items:center;gap:5px}
.chip .x{cursor:pointer;opacity:.6}.chip .x:hover{opacity:1}
.chip.atk{background:#ef444422;color:#fca5a5;border:1px solid #ef444455}
.chip.def{background:#38bdf822;color:#7dd3fc;border:1px solid #38bdf855}
.del-btn{width:100%;margin-top:10px;background:#ef444418;border:1px solid #ef444455;color:#fca5a5;
  padding:8px;border-radius:7px;font-size:11.5px;transition:.12s}
.del-btn:hover{background:#ef444433}
.switch{display:flex;align-items:center;justify-content:space-between;padding:8px;border-radius:7px;background:var(--bg-2);cursor:pointer}
.switch .tg{width:36px;height:20px;border-radius:11px;background:var(--bg-4);position:relative;transition:.15s;flex:0 0 auto}
.switch .tg::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--txt-1);top:3px;left:3px;transition:.15s}
.switch.on .tg{background:var(--offense)}
.switch.on .tg::after{left:19px;background:#fff}

/* ---------- Analysis tab ---------- */
.an-card{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.an-card h4{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt-1);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.an-row{display:flex;justify-content:space-between;font-size:11.5px;padding:4px 0;border-bottom:1px dashed var(--border)}
.an-row:last-child{border-bottom:none}
.an-row b{color:var(--txt-0)}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi .k{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.kpi .k .n{font-size:22px;font-weight:700}
.kpi .k .l{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt-2);margin-top:2px}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,5,9,.78);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--bg-2);border:1px solid var(--border-hi);border-radius:12px;width:min(860px,92vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 80px -20px #000}
.modal header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal header h3{font-size:15px;display:flex;align-items:center;gap:9px}
.modal header .x{background:none;border:none;color:var(--txt-1);font-size:22px;line-height:1}
.modal header .x:hover{color:var(--txt-0)}
.modal .mbody{padding:20px;overflow-y:auto}
.modal .mfoot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.matrix{width:100%;border-collapse:collapse;font-size:11px}
.matrix th,.matrix td{border:1px solid var(--border);padding:8px;text-align:left;vertical-align:top}
.matrix th{background:var(--bg-3);color:var(--txt-1);font-size:10px;text-transform:uppercase;letter-spacing:.6px}
.matrix td .n{color:var(--accent-hi);font-weight:700}
.matrix .x-mark{color:var(--ok);font-weight:700}
.matrix .o-mark{color:var(--txt-2)}
.pasta-stage{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.pasta-stage:last-child{border:none}
.pasta-num{flex:0 0 auto;width:36px;height:36px;border-radius:50%;background:var(--accent-lo);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.pasta-stage h4{font-size:13px;margin-bottom:3px}
.pasta-stage p{font-size:11.5px;color:var(--txt-1);line-height:1.5}
.pasta-stage .map{font-size:10px;color:var(--accent-hi);margin-top:4px}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.legend-card{border:1px solid var(--border);border-radius:9px;padding:14px;background:var(--bg-1)}
.legend-card h4{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:7px}
.legend-card p{font-size:11px;color:var(--txt-1);line-height:1.5}
.swatch{width:14px;height:14px;border-radius:4px;flex:0 0 auto}
.report pre{white-space:pre-wrap;font-size:11px;color:var(--txt-0);line-height:1.55;background:var(--bg-1);border:1px solid var(--border);border-radius:8px;padding:14px;max-height:60vh;overflow:auto}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--bg-3);border:1px solid var(--accent);color:var(--txt-0);padding:10px 18px;border-radius:8px;
  font-size:12px;z-index:200;transition:.25s;pointer-events:none;box-shadow:0 8px 30px -8px #000}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* keyframes for force field */
@keyframes ffpulse{0%,100%{opacity:.55}50%{opacity:.9}}
@keyframes dashmove{to{stroke-dashoffset:-24}}
@keyframes flowmove{to{stroke-dashoffset:-16}}
@keyframes tunnelflow{to{stroke-dashoffset:-40}}
@keyframes tunnelpulse{0%,100%{opacity:.45}50%{opacity:.75}}
.ff-border{animation:ffpulse 2.4s ease-in-out infinite}
.flow-anim{stroke-dasharray:5 6;animation:flowmove .8s linear infinite}
.flow-anim.off{stroke-dasharray:6 5;animation:flowmove .55s linear infinite}
.tunnel-core{stroke-dasharray:12 8;animation:tunnelflow 1.2s linear infinite}
.tunnel-core.off{animation:tunnelflow .8s linear infinite}
.tunnel-glow{animation:tunnelpulse 2s ease-in-out infinite}

/* ---------- Help Panel ---------- */
#help-overlay{position:fixed;inset:0;background:rgba(5,5,9,.92);backdrop-filter:blur(8px);z-index:9000;display:none;flex-direction:column;overflow:hidden}
#help-overlay.show{display:flex}
.help-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);flex:0 0 auto}
.help-bar h2{font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px}
.help-bar .x{background:none;border:none;color:var(--txt-1);font-size:26px;line-height:1;cursor:pointer}
.help-bar .x:hover{color:var(--txt-0)}
.help-tabs{display:flex;gap:2px;padding:0 28px;border-bottom:1px solid var(--border);flex:0 0 auto;background:var(--bg-1)}
.help-tabs button{background:none;border:none;padding:11px 18px;font-size:12px;font-weight:600;color:var(--txt-2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.help-tabs button:hover{color:var(--txt-0)}
.help-tabs button.active{color:var(--accent-hi);border-bottom-color:var(--accent-hi)}
.help-body{flex:1;overflow-y:auto;padding:28px 32px;line-height:1.65}
.help-body h3{font-size:15px;font-weight:700;margin:24px 0 10px;color:var(--accent-hi);border-bottom:1px solid var(--border);padding-bottom:6px}
.help-body h3:first-child{margin-top:0}
.help-body p{font-size:12.5px;color:var(--txt-1);margin-bottom:10px;max-width:700px}
.help-body ul{padding-left:18px;margin-bottom:12px}
.help-body li{font-size:12px;color:var(--txt-1);margin-bottom:5px;line-height:1.6}
.help-body li b{color:var(--txt-0)}
.help-body code{background:var(--bg-3);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:11px;color:var(--accent-hi)}
.help-body .kb{display:inline-block;background:var(--bg-3);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:10.5px;font-weight:600;color:var(--txt-0);margin:0 2px}
.help-body .hl{background:var(--accent-lo);border-radius:4px;padding:10px 14px;margin:10px 0 14px;border-left:3px solid var(--accent)}
.help-body .hl p{margin:0;color:var(--txt-0)}
.help-body .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:12px 0}
.help-body .card{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:14px}
.help-body .card h4{font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.help-body .card p{font-size:11.5px;margin:0}
.help-body .color-key{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.help-body .color-key .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
.help-body table{width:100%;border-collapse:collapse;font-size:11.5px;margin:10px 0 16px}
.help-body th,.help-body td{border:1px solid var(--border);padding:7px 10px;text-align:left}
.help-body th{background:var(--bg-3);color:var(--txt-1);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div id="app">
  <!-- ===================== SIDEBAR ===================== -->
  <aside id="sidebar">
    <div class="brand">
      <img class="logo" src="static/logo_transparent.png" alt="Skjaldborg" id="app-logo">
      <div>
        <h1>Skjald<span>borg</span></h1>
        <div class="tag">Purple-Team Threat Modeling</div>
      </div>
    </div>
    <div class="side-scroll" id="palette"><!-- built by JS --></div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div id="main">
    <header class="topbar">
      <div class="ttl">
        <h2 id="model-title">Threat Model</h2>
        <p>Drag a component onto the canvas. Wire <b>Data Flows</b>, raise <b>Boundaries</b>, map threats to <b>ATT&CK</b> &amp; <b>D3FEND</b>.</p>
      </div>
      <div class="actions">
        <button class="tbtn" id="btn-stride" title="STRIDE matrix">🛡️ STRIDE</button>
        <button class="tbtn" id="btn-pasta" title="PASTA stages">🍝 PASTA</button>
        <button class="tbtn" id="btn-legend" title="Legend">＃ Legend</button>
        <button class="tbtn" id="btn-report" title="Threat report">📄 Report</button>
        <button class="tbtn" id="btn-arrange" title="Auto-arrange layout">⊞ Arrange</button>
        <button class="tbtn" id="btn-undo" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
        <button class="tbtn" id="btn-redo" title="Redo (Ctrl+Y / Ctrl+Shift+Z)" disabled>↪ Redo</button>
        <button class="tbtn" id="btn-new" title="New empty project">📋 New</button>
        <button class="tbtn ghost" id="btn-import" title="Import JSON">⬇</button>
        <button class="tbtn" id="btn-export" title="Export JSON">⬆ Save</button>
        <button class="tbtn" id="btn-svg" title="Export as SVG image">🖼 SVG</button>
        <button class="tbtn primary" id="btn-sample">✨ Sample</button>
        <button class="tbtn" id="btn-help" title="Help & tutorial (?)">? Help</button>
      </div>
    </header>

    <div id="stage">
      <div id="canvas-wrap">
        <div id="hint">Tip: click a component in the left toolbox, then click the canvas to place. Right-click for context menu.</div>
        <svg id="canvas"></svg>
        <div class="zoom-controls">
          <button id="zoom-in">+</button>
          <div class="zoom-lvl" id="zoom-lvl">100%</div>
          <button id="zoom-out">−</button>
          <button id="zoom-fit" title="Fit / reset">⊡</button>
        </div>
      </div>
      <div id="insp-resizer" title="Drag to resize panel"></div>

      <!-- INSPECTOR -->
      <aside id="inspector">
        <div class="insp-tabs">
          <button data-itab="props" class="active">Properties</button>
          <button data-itab="analysis">Analysis</button>
        </div>
        <div class="insp-body" id="insp-props"></div>
        <div class="insp-body" id="insp-analysis" style="display:none"></div>
      </aside>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <header><h3 id="modal-title"></h3><button class="x" id="modal-close">×</button></header>
    <div class="mbody" id="modal-body"></div>
    <div class="mfoot" id="modal-foot"></div>
  </div>
</div>

<div id="help-overlay">
  <div class="help-bar">
    <h2>? PurpleSkjaldborg — Help</h2>
    <button class="x" id="help-close">×</button>
  </div>
  <div class="help-tabs">
    <button class="active" data-htab="tutorial">Tutorial</button>
    <button data-htab="metamodels">Metamodels</button>
    <button data-htab="workflow">Workflow</button>
    <button data-htab="shortcuts">Shortcuts</button>
    <button data-htab="about">About</button>
  </div>
  <div class="help-body" id="help-body"></div>
</div>
<div id="toast"></div>
<div id="ctx-menu"></div>
<input type="file" id="file-input" accept=".json,.skjaldborg" style="display:none">

  const idx=d.findIndex(x=>x.id==='D3-MFA');
  if(n.props.mfa){if(idx<0)d.push({id:'D3-MFA',name:'Multi-factor Authentication'});}
  else{if(idx>=0)d.splice(idx,1);}

const MFA_TYPES=new Set(['external','api','cloud','iam','webapp','ad','siem','process','vm','firewall']);
function computeEaseOfAttack(n){
  const c=COMPONENTS[n.type]||{};
  if(c.redteam) return null; // attacker infra has no "ease of attack" from defender POV
  const base=BASE_EASE[n.type]??50;
  let delta=0;
  const factors=[];
  // Offensive edges targeting this node
  const atkEdges=state.edges.filter(e=>e.offensive&&(e.to===n.id||(e.bidirectional&&e.from===n.id)));
  if(atkEdges.length){delta+=atkEdges.length*10;factors.push({l:`${atkEdges.length} attack vector(s)`,v:+atkEdges.length*10});}
  // STRIDE threats flagged (weighted)
  const SW={S:7,T:5,R:3,I:6,D:4,E:10};
  let strideD=0; Object.entries(n.props.stride||{}).forEach(([k,v])=>{if(v)strideD+=SW[k]||5;});
  if(strideD){delta+=strideD;factors.push({l:'STRIDE threats flagged',v:+strideD});}
  // Privileged container
  if(n.props.privileged){delta+=14;factors.push({l:'Privileged container',v:+14});}
  // Internet-exposed — more reachable attack surface
  if(n.props.internetExposed){delta+=8;factors.push({l:'Internet-exposed',v:+8});}
  // MFA — most impactful single auth control; absence is also a penalty on capable types
  if(MFA_TYPES.has(n.type)){
    if(n.props.mfa){delta-=18;factors.push({l:'MFA enabled',v:-18});}
    else{delta+=8;factors.push({l:'No MFA (auth-capable node)',v:+8});}
  }
  // Security controls reduce ease
  const ctrls=(n.props.controls||[]).length;
  if(ctrls){delta-=ctrls*9;factors.push({l:`${ctrls} security control(s)`,v:-ctrls*9});}
  // D3FEND countermeasures (-4 each; D3-MFA counted here when mfa prop is set, stacking with the MFA factor above)
  const d3c=(n.props.d3fend||[]).length;
  if(d3c){delta-=d3c*4;factors.push({l:`${d3c} D3FEND countermeasure(s)`,v:-d3c*4});}
  // Encryption at rest
  if(n.props.encryptedAtRest){delta-=12;factors.push({l:'Encrypted at rest',v:-12});}
  // Encrypted inbound flows
  const encIn=state.edges.filter(e=>e.encryptedInTransit&&e.to===n.id).length;
  if(encIn){delta-=encIn*5;factors.push({l:`${encIn} encrypted inbound flow(s)`,v:-encIn*5});}
  // Manual adjustment
  const adj=n.props.easeAdjust||0;
  if(adj)factors.push({l:'Manual adjustment',v:adj});
  return {value:Math.max(0,Math.min(100,Math.round(base+delta+adj))),base,factors};
}

}

/* Find a collision-free canvas position near (x,y), stepping through offsets */
function findFreePos(x, y){
  const GAP = R * 2.6;
  const offsets = [[0,0],[88,0],[0,88],[-88,0],[0,-88],[88,88],[-88,88],[88,-88],[-88,-88],[176,0],[0,176],[-176,0]];
  for(const [dx,dy] of offsets){
    const nx=snap(x+dx), ny=snap(y+dy);
    if(!state.nodes.some(n=>Math.hypot(n.x-nx,n.y-ny)<GAP)) return {x:nx,y:ny};
  }
  return {x:snap(x + (Math.random()*220-110)), y:snap(y + (Math.random()*220-110))};
}

function renderPalette(filter){
  const f=(filter||'').trim().toLowerCase();
  const list=document.getElementById('pal-list'); let html='', total=0;
  PGROUPS.forEach(g=>{
    const top=(g.items||[]).filter(k=>palMatch(k,f));
    const subs=(g.subs||[]).map(s=>({label:s.label, key:g.label+'::'+s.label, items:s.items.filter(k=>palMatch(k,f))}));
    const count=top.length+subs.reduce((a,s)=>a+s.items.length,0);
    if(f && count===0) return;
    total+=count;
    const gCol=!f&&collapsed.has(g.label);
    html+=`<div class="side-group"><div class="side-label${gCol?' collapsed':''}" data-grp="${g.label}">
      <span class="caret">▼</span><span>${g.label}</span><span class="grp-count">${count}</span></div>`;
    if(!gCol){
      top.forEach(k=>html+=palItem(k));
      subs.forEach(s=>{
        if(f && !s.items.length) return;
        const sCol=!f&&collapsed.has(s.key);
        html+=`<div class="sub-label${sCol?' collapsed':''}" data-sub="${s.key}">
          <span class="caret">▼</span><span>${s.label}</span><span class="grp-count">${s.items.length}</span></div>`;
        if(!sCol){html+=`<div class="sub-items">`; s.items.forEach(k=>html+=palItem(k)); html+=`</div>`;}
      });
    }
    html+='</div>';
  });
  list.innerHTML = total?html:`<div class="pal-empty">No components match “${esc(f)}”.</div>`;
  list.querySelectorAll('.palette-item').forEach(el=>{
    const tool=el.dataset.tool;
    el.addEventListener('click',()=>armTool(tool));
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('tool',tool);armed=tool;});
  });
  const req=()=>renderPalette(document.getElementById('pal-q').value);
  list.querySelectorAll('[data-grp]').forEach(el=>el.addEventListener('click',()=>{
    const l=el.dataset.grp; collapsed.has(l)?collapsed.delete(l):collapsed.add(l); req();}));
  list.querySelectorAll('[data-sub]').forEach(el=>el.addEventListener('click',()=>{
    const l=el.dataset.sub; collapsed.has(l)?collapsed.delete(l):collapsed.add(l); req();}));
}

function armTool(tool){
  if(armed===tool){disarm();return;}
  armed=tool; connectFrom=null;
  document.querySelectorAll('.palette-item').forEach(el=>el.classList.toggle('armed',el.dataset.tool===tool));

  canvas.classList.toggle('connect-mode', c.kind==='edge'||c.kind==='attack');
  if(c.kind==='edge'||c.kind==='attack') showHint(`<b>${c.label}</b>: click <b>source</b> → then <b>target</b> node. Hold <b>Shift</b> to chain multiple. Esc to cancel.`);

  else showHint(`<b>${c.label}</b>: click canvas to place. Then connect edges and assign STRIDE threats in the inspector.`);
}

function edgeGeom(a,b){
  // shorten to node edges, then bow into a smooth quadratic curve
  const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
  const ux=dx/len, uy=dy/len;
  const sx=a.x+ux*(R+3),  sy=a.y+uy*(R+3);
  const ex=b.x-ux*(R+10), ey=b.y-uy*(R+10);
  const cdx=ex-sx, cdy=ey-sy, clen=Math.hypot(cdx,cdy)||1;
  const nx=-cdy/clen, ny=cdx/clen;                 // unit normal
  const bow=Math.min(58, clen*0.18);               // curvature
  const cx=sx+cdx*0.5+nx*bow, cy=sy+cdy*0.5+ny*bow;
  const lx=0.25*sx+0.5*cx+0.25*ex, ly=0.25*sy+0.5*cy+0.25*ey; // point on curve at t=.5
  return {d:`M ${sx.toFixed(1)} ${sy.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}`, lx, ly};
}

const snap=v=>Math.round(v/11)*11;

// Smooth closed SVG path through points using cubic bezier (Catmull-Rom → bezier)
function smoothClosedPath(pts, tension=0.35){
  if(pts.length<2) return '';
  if(pts.length===2) return `M${pts[0][0]},${pts[0][1]} L${pts[1][0]},${pts[1][1]} Z`;
  const n=pts.length;
  let d=`M${pts[0][0]},${pts[0][1]}`;
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n], p1=pts[i], p2=pts[(i+1)%n], p3=pts[(i+2)%n];
    const cp1x=p1[0]+(p2[0]-p0[0])*tension, cp1y=p1[1]+(p2[1]-p0[1])*tension;
    const cp2x=p2[0]-(p3[0]-p1[0])*tension, cp2y=p2[1]-(p3[1]-p1[1])*tension;
    d+=` C${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0]},${p2[1]}`;
  }
  return d+' Z';
}
// Open smooth path for preview (not closed)
function smoothOpenPath(pts, cursorX, cursorY, tension=0.35){
  if(!pts.length) return '';
  const all=[...pts,[cursorX,cursorY]];
  const n=all.length;
  if(n<2) return `M${all[0][0]},${all[0][1]}`;
  let d=`M${all[0][0]},${all[0][1]}`;
  for(let i=0;i<n-1;i++){
    const p0=all[Math.max(0,i-1)], p1=all[i], p2=all[i+1], p3=all[Math.min(n-1,i+2)];
    const cp1x=p1[0]+(p2[0]-p0[0])*tension, cp1y=p1[1]+(p2[1]-p0[1])*tension;
    const cp2x=p2[0]-(p3[0]-p1[0])*tension, cp2y=p2[1]-(p3[1]-p1[1])*tension;
    d+=` C${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0]},${p2[1]}`;
  }
  return d;
}

// Point-in-polygon (ray casting) for freehand boundaries
function ptInPoly(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
// Axis-aligned bounding box of a freehand boundary
function freehandBBox(b){
  const xs=b.points.map(p=>p[0]), ys=b.points.map(p=>p[1]);
  const x=Math.min(...xs), y=Math.min(...ys);
  return {x, y, w:Math.max(...xs)-x, h:Math.max(...ys)-y};
}

// Check which nodes are geometrically inside a boundary
function nodesInside(b){
  if(b.points) return state.nodes.filter(n=>ptInPoly(n.x,n.y,b.points));
  return state.nodes.filter(n=>n.x>=b.x && n.x<=b.x+b.w && n.y>=b.y && n.y<=b.y+b.h);
}

// Toggle lock on a boundary
function toggleLock(b){
  b.locked = b.locked===false ? true : (b.locked===true ? false : false);
  render();
  toast(b.locked!==false ? `${b.label} locked 🔒` : `${b.label} unlocked 🔓`);
}

// Fit boundary to contents (auto-resize to enclose all nodes inside + padding)
function fitBoundaryToContents(b){
  if(b.points){toast('Freehand boundaries cannot be auto-fitted');return;}
  const inside=nodesInside(b);
  if(!inside.length){toast('No nodes inside boundary');return;}
  const pad=60;
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  inside.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x);maxy=Math.max(maxy,n.y);});
  b.x=snap(minx-pad); b.y=snap(miny-pad-12);
  b.w=snap(maxx-minx+pad*2); b.h=snap(maxy-miny+pad*2+34);
  render(); toast('Boundary fitted to contents');
}

// Auto-arrange: semantic zone layout
function autoArrange(){
  if(!state.nodes.length){toast('Nothing to arrange');return;}
  pushHistory();

  // Classify each node into a semantic zone
  const K8S_TYPES=new Set(['k8s','k8s_cp','etcd','crd','operator','k8s_node','pod','k8s_svc','ingress','netpol','configmap','secret','pvc','pv','storageclass','namespace']);
  const CLOUD_TYPES=new Set(['cloud','vm','docker','bucket','manageddb','kms','secretsmgr','vpc','clb','serverless','cdn']);
  const IAM_TYPES=new Set(['iam','ad','iamrole','sa','rbac']);
  const NET_TYPES=new Set(['lb','nat_gw','vpn_gw','proxy','sdwan','nac','firewall','waf','ids','casb','dlp','dns_srv','mail_gw']);
  const PIVOT_TYPES=new Set(['ligolo','sshtunnel','chisel','sshuttle','socatpivot','proxychains','rpivot','dnscat','iodine','lolbin','loldriver','filetransfer']);
  const GREY_TYPES=new Set(['grey','redirector']);

  const groups={ext:[],net:[],corp:[],k8s:[],cloud:[],iam:[],blueteam:[],grey:[],pivot:[],redteam:[]};

  state.nodes.forEach(n=>{
    const c=COMPONENTS[n.type]||{};
    if(n.type==='external')               groups.ext.push(n);
    else if(K8S_TYPES.has(n.type))        groups.k8s.push(n);
    else if(CLOUD_TYPES.has(n.type))      groups.cloud.push(n);
    else if(IAM_TYPES.has(n.type))        groups.iam.push(n);
    else if(NET_TYPES.has(n.type))        groups.net.push(n);
    else if(c.blueteam)                   groups.blueteam.push(n);
    else if(GREY_TYPES.has(n.type))       groups.grey.push(n);
    else if(PIVOT_TYPES.has(n.type))      groups.pivot.push(n);
    else if(c.redteam)                    groups.redteam.push(n);
    else                                  groups.corp.push(n);
  });

  // Place nodes in a grid starting at (ox,oy), auto-computing cols from count
  function layoutGrid(nodes, ox, oy, sp, maxCols=4){
    if(!nodes.length) return;
    const cols=Math.min(maxCols, Math.ceil(Math.sqrt(nodes.length)));
    nodes.forEach((n,i)=>{
      n.x=snap(ox+(i%cols)*sp);
      n.y=snap(oy+Math.floor(i/cols)*sp);
    });
  }

  // Canvas zones — laid out on a conceptual threat-model map:
  //
  //  [Ext]  [Net/DMZ]  [Corporate core]  [Cloud]  [IAM]  [Blue Team]
  //                    [Kubernetes]
  //  [Red Team]  [Grey Zone]  [Pivot / Tunneling]
  //
  const sp=220; // spacing between node centres

  // Top band — left to right
  layoutGrid(groups.ext,      100,  150, sp, 1);   // External actors — single column at far left
  layoutGrid(groups.net,      380,  150, sp, 3);   // Network / DMZ
  layoutGrid(groups.corp,     900,  150, sp, 4);   // Corporate / Application core
  layoutGrid(groups.cloud,   1780,  150, sp, 3);   // Cloud services
  layoutGrid(groups.iam,     2280,  150, sp, 2);   // Identity & Access
  layoutGrid(groups.blueteam,2620,  150, sp, 2);   // Blue Team defense

  // Middle band — Kubernetes cluster (below corporate)
  layoutGrid(groups.k8s,      900,  800, sp, 5);

  // Bottom band — attacker infrastructure
  layoutGrid(groups.redteam,  100, 1500, sp, 4);   // Red Team ops
  layoutGrid(groups.grey,     780, 1500, sp, 3);   // Grey zone / redirectors
  layoutGrid(groups.pivot,   1240, 1500, sp, 4);   // Pivoting & tunneling

  // Auto-resize rect boundaries to fit contained nodes
  state.boundaries.forEach(b=>fitBoundaryToContents(b));

  render(); fitView(); schedSave(); toast('Auto-arranged layout ⊞');
}

function bbox(nodes,pad){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  nodes.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x);maxy=Math.max(maxy,n.y);});
  return {x:snap(minx-pad), y:snap(miny-pad-12), w:snap(maxx-minx+pad*2), h:snap(maxy-miny+pad*2+34)};
}

function select(type,id){
  selected=(type&&id)?{type,id}:null; renderNodes(); renderEdges(); renderBoundaries(); renderInspector();
  // contextual modeling hints
  if(!type) return;
  if(type==='node'){
    const n=nodeAt(id), c=COMPONENTS[n.type];
    if(c.redteam) showHint(`<b>${n.label}</b> — connect attack edges (red) to show the kill chain. Map ATT&CK in the inspector.`);
    else if(n.type==='ad') showHint(`<b>${n.label}</b> — consider: Kerberoasting, DCSync, GPO abuse. Check STRIDE checkboxes for threats.`);
    else if(n.type==='store') showHint(`<b>${n.label}</b> — mark PII if it holds personal data. Add D3FEND countermeasures (encryption, access control).`);
    else if(n.type==='firewall'||n.type==='api') showHint(`<b>${n.label}</b> — enclose in a boundary to define trust zones. Add D3FEND controls in the inspector.`);
    else if(n.type==='k8s'||n.type==='k8s_cp') showHint(`<b>${n.label}</b> — double-click to expand into sub-components (pods, services, etc).`);
  } else if(type==='edge'){
    const ed=byId(state.edges,id);
    if(!ed.offensive) showHint(`Data flow selected — double-click to toggle offensive. Use inspector to map ATT&CK techniques.`);
    else showHint(`Attack vector selected — map ATT&CK techniques in the inspector. Toggle tunnel for pivot connections.`);
  } else if(type==='boundary'){
    showHint(`Boundary selected — click to grab & move, drag corners to resize. Right-click for more options.`);
  }
}

      : det.detectedBy.length?`<div style="font-size:10.5px;color:var(--ok);margin-top:6px">✓ Full detection surface covered by current blue team.</div>`:'';

      <select id="f-pasta"><option value="">—</option>

    <label class="switch ${n.props.internetExposed?'on':''}" id="f-inet" style="--offense:#3b82f6;margin-top:10px">

}

    redteam:'Red Team Infrastructure — offensive perimeter (ATT&CK)',grey:'Grey Zone — disposable fronting infra (ATT&CK)',cloudbnd:'Cloud Boundary — cloud-native resources (D3FEND)'}[b.type]||cfg.label;

        <label class="chk"><input type="checkbox" disabled> <span class="ck-txt">Lawful basis documented</span></label>
        <small style="color:var(--txt-2)">Nodes inside this zone are flagged PII automatically.</small></div>`;
  }
  return `

      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:${cfg.color}">

    ${(()=>{const sc=boundaryScore(b),rk=riskLevel(sc.residual);return `<div class="an-card">
      <h4>📊 Attack-tree score <span style="margin-left:auto;color:${rk.c};font-weight:700">${rk.l} risk</span></h4>
      <div style="font-size:10px;color:var(--txt-2);margin-bottom:2px">${sc.inside} asset(s) · ${sc.off} attack vector(s) inside · controls reduce residual risk</div>
      ${scoreBar('⚔ Attacker score',sc.A,'var(--offense)')}
      ${scoreBar('🛡 Defender score',sc.D,'var(--trust)')}
      ${scoreBar('▲ Residual risk',sc.residual,rk.c)}</div>`;})()}
    ${mapHtml}

function mitreUrl(id, name){
  if(id.startsWith('T')){
    // ATT&CK: T1071 → /techniques/T1071/, T1071.001 → /techniques/T1071/001/
    const parts=id.split('.');
    return 'https://attack.mitre.org/techniques/'+parts[0]+'/'+(parts[1]?parts[1]+'/':'');
  }
  // D3FEND: D3-PA → /technique/d3f:ProcessAnalysis (name without spaces)
  return 'https://d3fend.mitre.org/technique/d3f:'+name.replace(/\s+/g,'');
}
function chipBox(list,cls,field){
  if(!list.length)return `<div style="font-size:11px;color:var(--txt-2);padding:4px 2px">None mapped yet.</div>`;
  return `<div class="chips">${list.map(t=>`<span class="chip ${cls}" data-rm="${t.id}" data-field="${field}">
    <a href="${mitreUrl(t.id,t.name)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none" title="Open on MITRE"><code>${t.id}</code></a> ${esc(t.name)} <span class="x" title="remove">×</span></span>`).join('')}</div>`;
}

function wireInspector(){
  const sel=selected; if(!sel)return;
  const obj = sel.type==='node'?nodeAt(sel.id): sel.type==='edge'?byId(state.edges,sel.id):byId(state.boundaries,sel.id);
  if(!obj)return;
  const $=id=>document.getElementById(id);
  if($('f-variant'))$('f-variant').onchange=e=>{
    const vid=e.target.value;
    const vars=TOOL_VARIANTS[obj.type]||[];
    const v=vars.find(x=>x.id===vid);
    obj.props.toolVariant=vid||undefined;
    if(v){
      obj.label=v.label;
      // Pre-fill ATT&CK / D3FEND if currently empty
      if(v.a&&!obj.props.attack.length) obj.props.attack=v.a.map(([id,name])=>({id,name}));
      if(v.d&&!obj.props.d3fend.length) obj.props.d3fend=v.d.map(([id,name])=>({id,name}));
    } else {
      obj.label=COMPONENTS[obj.type].label;
    }
    pushHistory(); renderNodes(); renderEdges(); renderInspector(); schedSave();
  };
  if($('f-label'))$('f-label').oninput=e=>{obj.label=e.target.value; renderNodes(); renderEdges(); renderBoundaries(); schedSave();};
  if($('f-notes'))$('f-notes').oninput=e=>{ (sel.type==='node'?obj.props:obj).notes=e.target.value; schedSave(); };
  if($('f-inet'))$('f-inet').onclick=()=>{const n=nodeAt(sel.id);n.props.internetExposed=!n.props.internetExposed;renderInspector();renderNodes();schedSave();toast(n.props.internetExposed?'Marked as internet-exposed 🌐':'Internet exposure cleared');};
  if($('f-mfa'))$('f-mfa').onclick=()=>{const n=nodeAt(sel.id);toggleMFA(n);renderInspector();renderNodes();schedSave();toast(n.props.mfa?'MFA enabled 🔑':'MFA removed');};
  if($('f-free'))$('f-free').onclick=()=>{const n=nodeAt(sel.id); n.free=!n.free; renderInspector(); renderNodes(); schedSave(); toast(n.free?'Free movement enabled ⟐':'Snap to grid restored');};
  if($('f-pii'))$('f-pii').onclick=()=>{obj.props.pii=!obj.props.pii; renderInspector(); renderNodes(); renderAnalysis();};
  if($('f-off'))$('f-off').onclick=()=>{obj.offensive=!obj.offensive; renderInspector(); renderEdges(); renderAnalysis();};
  if($('f-bidir'))$('f-bidir').onclick=()=>{obj.bidirectional=!obj.bidirectional; renderInspector(); renderEdges(); renderAnalysis();};
  if($('f-tunnel'))$('f-tunnel').onclick=()=>{obj.tunnel=!obj.tunnel; if(obj.tunnel)obj.bidirectional=true; renderInspector(); renderEdges(); renderAnalysis();};
  if($('f-enc-transit'))$('f-enc-transit').onclick=()=>{obj.encryptedInTransit=!obj.encryptedInTransit; renderInspector(); schedSave(); toast(obj.encryptedInTransit?'Encrypted in Transit 🔐':'Encryption in transit cleared');};
  if($('f-classification'))$('f-classification').onchange=e=>{obj.props.classification=e.target.value; const lv=CLASSIFICATION_LEVELS.find(l=>l.k===e.target.value)||CLASSIFICATION_LEVELS[0]; e.target.style.color=lv.color; schedSave();};
  if($('ease-minus'))$('ease-minus').onclick=()=>{const n=nodeAt(sel.id);if(!n)return;n.props.easeAdjust=(n.props.easeAdjust||0)-5;renderInspector();renderNodes();schedSave();};
  if($('ease-plus')) $('ease-plus').onclick= ()=>{const n=nodeAt(sel.id);if(!n)return;n.props.easeAdjust=(n.props.easeAdjust||0)+5;renderInspector();renderNodes();schedSave();};
  if($('f-enc-rest'))$('f-enc-rest').onclick=()=>{obj.props.encryptedAtRest=!obj.props.encryptedAtRest; renderInspector(); schedSave(); toast(obj.props.encryptedAtRest?'Encrypted at Rest 🔐':'Encryption at rest cleared');};
  document.querySelectorAll('[data-datacat]').forEach(chip=>chip.onclick=()=>{
    const k=chip.dataset.datacat;
    const cats=obj.props.dataCategories=obj.props.dataCategories||[];
    const i=cats.indexOf(k); if(i>=0)cats.splice(i,1); else cats.push(k);
    renderInspector(); schedSave();
  });
  if($('f-pasta'))$('f-pasta').onchange=e=>{obj.props.pasta=e.target.value;};
  document.querySelectorAll('[data-stride]').forEach(cb=>cb.onchange=e=>{

  if($('pick-attack'))$('pick-attack').onclick=()=>pickTechnique('attack');

  document.querySelectorAll('[data-rm]').forEach(x=>x.querySelector('.x').onclick=()=>{

function wireCollapsibleSections(){
  const body=document.getElementById('insp-props');
  if(!body)return;
  body.querySelectorAll('.sec-title').forEach(title=>{
    if(title._cw)return;
    title._cw=true;
    const key='insp_sec_'+title.textContent.trim().replace(/[^\w]/g,'_').slice(0,28);
    // Collect sibling elements until the next sec-title, del-btn, or parent end
    const wrap=document.createElement('div');
    wrap.className='sec-body-wrap';
    let sib=title.nextElementSibling;
    const collected=[];
    while(sib&&!sib.classList.contains('sec-title')&&!sib.classList.contains('del-btn')){
      collected.push(sib); sib=sib.nextElementSibling;
    }
    if(!collected.length)return;
    title.parentNode.insertBefore(wrap,collected[0]);
    collected.forEach(s=>wrap.appendChild(s));
    // Caret
    const caret=document.createElement('span');
    caret.className='sec-caret';
    title.style.display='flex';
    title.appendChild(caret);
    // Restore state
    const collapsed=sessionStorage.getItem(key)==='1';
    if(collapsed){wrap.style.display='none';caret.textContent='▶';}
    else{caret.textContent='▼';}
    title.onclick=()=>{
      const nowHidden=wrap.style.display==='none';
      wrap.style.display=nowHidden?'':'none';
      caret.textContent=nowHidden?'▼':'▶';
      sessionStorage.setItem(key,nowHidden?'0':'1');
    };
  });
}

/* =====================================================================
   ANALYSIS TAB
   ===================================================================== */
function countNodeThreats(n){return Object.values(n.props.stride).filter(Boolean).length;}

/* ---- Attack-tree style weighting (inspired by christian-schneider.net AttackTree) ----
   Leaf weight per TTP/attack-vector & STRIDE exposure builds the attacker likelihood;
   control effectiveness (D3FEND + applied controls) saturates and reduces residual risk. */
const SCORE_NORM=(x,k)=>Math.round((1-Math.exp(-x/k))*100);
function riskLevel(r){return r<25?{l:'Low',c:'var(--ok)'}:r<50?{l:'Medium',c:'var(--warn)'}:r<75?{l:'High',c:'#fb923c'}:{l:'Critical',c:'var(--danger)'};}
function nodesInBoundary(b){
  if(b.points) return state.nodes.filter(n=>ptInPoly(n.x,n.y,b.points));
  return state.nodes.filter(n=>n.x>b.x&&n.x<b.x+b.w&&n.y>b.y&&n.y<b.y+b.h);
}
function ctrlD3(ct){return ct.d3fend||(NODE_DEFAULTS[ct.type]&&NODE_DEFAULTS[ct.type].d?NODE_DEFAULTS[ct.type].d.map(([id,name])=>({id,name})):[]); }
function scoreFrom(nodes,edges,bnd){
  const ids=new Set(nodes.map(n=>n.id));
  const off=edges.filter(e=>e.offensive&&(ids.has(e.from)||ids.has(e.to)));
  let atk=0, def=0;
  off.forEach(e=>atk+=6+3*((e.attack||[]).length));
  nodes.forEach(n=>{ atk+=2.5*((n.props.attack||[]).length)+1.5*countNodeThreats(n); if(COMPONENTS[n.type].redteam)atk+=5;
    def+=3*((n.props.d3fend||[]).length); (n.props.controls||[]).forEach(ct=>def+=4+1.5*(ctrlD3(ct).length)); if(COMPONENTS[n.type].blueteam)def+=5; });
  if(bnd){ atk+=4*((bnd.attack||[]).length); def+=4*((bnd.d3fend||[]).length)+({trust:9,freehand:9,netpol:7,namespace:4,privacy:3}[bnd.type]||0); }
  return {atk,def,off:off.length};
}
// Compute how much of a red team node's D3FEND detection surface is covered by blue team in the model
function computeRedTeamDetection(n){
  const detectTechs=new Set((n.props.d3fend||[]).map(t=>t.id));
  if(!detectTechs.size) return {coverage:0,bustRisk:0,detectedBy:[],coveredIds:[]};
  const coveredIds=new Set();
  const detectedBy=[];
  state.nodes.forEach(bn=>{
    const c=COMPONENTS[bn.type]||{};
    // collect all D3FEND from the blue node itself + controls applied to any node that is this blue node
    const d3List=[];
    if(c.blueteam)(bn.props.d3fend||[]).forEach(t=>d3List.push(t));
    (bn.props.controls||[]).forEach(ct=>ctrlD3(ct).forEach(t=>d3List.push(t)));
    const hits=d3List.filter(t=>detectTechs.has(t.id));
    if(hits.length){
      detectedBy.push({node:bn,techniques:hits});
      hits.forEach(t=>coveredIds.add(t.id));
    }
  });
  // also scan controls on non-blue nodes
  state.nodes.forEach(host=>{
    (host.props.controls||[]).forEach(ct=>{
      const hits=ctrlD3(ct).filter(t=>detectTechs.has(t.id));
      hits.forEach(t=>coveredIds.add(t.id));
      if(hits.length&&!detectedBy.some(d=>d.node.id===host.id)){
        detectedBy.push({node:host,techniques:hits,asControl:ct.label});
      }
    });
  });
  const coverage=Math.round(coveredIds.size/detectTechs.size*100);
  const opsec=opsecFor(n);
  // bust risk = detection coverage dampened by OpSec level (level 1=loud → full weight, level 5=quiet → 40% weight)
  const opsecMult=[0,1.0,0.82,0.65,0.50,0.40][opsec.level]||0.65;
  const bustRisk=Math.round(coverage*opsecMult);
  return {coverage,bustRisk,detectedBy,coveredIds:[...coveredIds],totalTechs:detectTechs.size};
}
function bustRiskLevel(r){
  return r<20?{l:'Unlikely',c:'#22c55e'}:r<45?{l:'Possible',c:'#84cc16'}:r<65?{l:'Likely',c:'#eab308'}:r<80?{l:'High',c:'#f97316'}:{l:'Critical',c:'#ef4444'};
}

function boundaryScore(b,k){k=k||26;
  const ins=nodesInBoundary(b); const r=scoreFrom(ins,state.edges,b);
  const A=SCORE_NORM(r.atk,k), D=SCORE_NORM(r.def,k);
  return {A,D,residual:Math.max(0,Math.round(A*(1-0.8*D/100))),off:r.off,inside:ins.length};
}
function scoreBar(label,val,color){return `<div style="font-size:10.5px;display:flex;justify-content:space-between;margin:7px 0 2px"><span>${label}</span><b style="color:${color}">${val}</b></div>
  <div style="height:7px;background:var(--bg-3);border-radius:4px;overflow:hidden"><div style="height:100%;width:${val}%;background:${color}"></div></div>`;}
function panTo(x,y){
  const cw=canvas.clientWidth||800, ch=canvas.clientHeight||600;
  view.x=cw/2-x*view.k; view.y=ch/2-y*view.k; applyView();
}
function selectNode(id){
  select('node',id); renderInspector(); renderNodes(); renderEdges();
  const n=nodeAt(id); if(n) panTo(n.x,n.y);
}
function selectBoundary(id){
  select('boundary',id); renderInspector(); renderBoundaries();
  const b=byId(state.boundaries,id);
  if(b){const bb=b.points?freehandBBox(b):b; panTo(bb.x+bb.w/2, bb.y+bb.h/2);}
}
function wireAnalysis(){
  document.querySelectorAll('[data-sel-node]').forEach(el=>{
    el.addEventListener('click',()=>selectNode(el.dataset.selNode));
  });
  document.querySelectorAll('[data-sel-bnd]').forEach(el=>{
    el.addEventListener('click',()=>selectBoundary(el.dataset.selBnd));
  });
  document.querySelectorAll('[data-exp-toggle]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=document.getElementById(btn.dataset.expToggle);
      if(!t)return;
      const show=t.style.display==='none';
      t.style.display=show?'':'none';
      const c=btn.querySelector('.ec');
      if(c)c.textContent=show?'▼':'▶';
    });
  });
}
function renderAnalysis(){
  const el=document.getElementById('insp-analysis');
  const nodes=state.nodes, edges=state.edges, bnds=state.boundaries;
  if(!nodes.length){el.innerHTML=`<div class="empty-note">Add components to the canvas to see analysis.</div>`;return;}

  const threats=nodes.reduce((a,n)=>a+countNodeThreats(n),0);
  const offensive=edges.filter(e=>e.offensive).length;
  const piiNodes=nodes.filter(n=>n.props.pii);
  const pvB=bnds.filter(b=>b.type==='privacy');
  const trustB=bnds.filter(b=>b.type==='trust');
  const rtNodes=nodes.filter(n=>COMPONENTS[n.type]?.redteam);
  const btNodes=nodes.filter(n=>COMPONENTS[n.type]?.blueteam);
  const appliedControls=nodes.reduce((a,n)=>a+(n.props.controls||[]).length,0);

  // Collect all ATT&CK / D3FEND ids with sources
  const attackMap={}; // id -> {name, sources:[label]}
  const defMap={};
  const addA=(id,name,src)=>{if(!attackMap[id])attackMap[id]={name,sources:[]};attackMap[id].sources.push(src);};
  const addD=(id,name,src)=>{if(!defMap[id])defMap[id]={name,sources:[]};defMap[id].sources.push(src);};
  nodes.forEach(n=>{(n.props.attack||[]).forEach(t=>addA(t.id,t.name,n.label));(n.props.d3fend||[]).forEach(t=>addD(t.id,t.name,n.label));(n.props.controls||[]).forEach(ct=>ctrlD3(ct).forEach(t=>addD(t.id,t.name,n.label+' (shield)')));});
  edges.forEach(e=>(e.attack||[]).forEach(t=>addA(t.id,t.name,'edge: '+(nodeAt(e.from)?.label||'?')+'→'+(nodeAt(e.to)?.label||'?'))));
  bnds.forEach(b=>{(b.attack||[]).forEach(t=>addA(t.id,t.name,b.label));(b.d3fend||[]).forEach(t=>addD(t.id,t.name,b.label));});
  const attackIds=Object.keys(attackMap), defIds=Object.keys(defMap);
  const cov=attackIds.length?Math.min(100,Math.round(defIds.length/Math.max(attackIds.length,1)*100)):0;

  // STRIDE tally + per-letter node lists
  const tally={S:[],T:[],R:[],I:[],D:[],E:[]};
  nodes.forEach(n=>Object.entries(n.props.stride).forEach(([k,v])=>{if(v)tally[k].push(n);}));
  // Which nodes haven't been assessed for each applicable letter
  const unassessed={S:[],T:[],R:[],I:[],D:[],E:[]};
  nodes.forEach(n=>{const c=COMPONENTS[n.type];if(c?.redteam||c?.blueteam)return;const app=STRIDE_APPLIES[n.type]||[];app.forEach(k=>{if(!n.props.stride[k])unassessed[k].push(n);});});

  // ── Risk Findings ──
  const findings=[];
  // Undetected red-team nodes
  const undetectedRT=rtNodes.filter(n=>!(n.props.d3fend||[]).length&&!(n.props.controls||[]).length);
  if(undetectedRT.length) findings.push({cls:'crit',icon:'🔴',title:`${undetectedRT.length} Red-Team node(s) with no detection coverage`,detail:'These attacker-owned assets have no D3FEND countermeasures mapped — they are invisible to your defenses.',nodes:undetectedRT,action:'Select first'});
  // PII outside data protection boundary
  const piiUnprotected=piiNodes.filter(n=>!pvB.some(b=>nodesInside(b).find(x=>x.id===n.id)));
  if(piiUnprotected.length) findings.push({cls:'crit',icon:'🔴',title:`${piiUnprotected.length} PII asset(s) outside a Data Protection boundary`,detail:'GDPR / privacy regulations require PII-handling components to sit inside a marked Data Protection (green) boundary.',nodes:piiUnprotected,action:'Select first'});
  // Low coverage
  if(attackIds.length>0&&cov<40) findings.push({cls:'crit',icon:'🔴',title:`Defensive coverage is ${cov}% — attack surface exceeds defenses`,detail:`You have ${attackIds.length} ATT&CK technique(s) mapped but only ${defIds.length} D3FEND countermeasure(s). Add Blue-Team controls or D3FEND mappings.`});
  // Attack vectors without ATT&CK
  const unmappedAV=edges.filter(e=>e.offensive&&!(e.attack||[]).length);
  if(unmappedAV.length) findings.push({cls:'warn',icon:'🟡',title:`${unmappedAV.length} attack vector(s) without ATT&CK technique mappings`,detail:'Map specific technique IDs (e.g. T1566 Phishing) to attack edges so the coverage score is accurate and the report is complete.'});
  // STRIDE-exposed nodes with no controls
  const strideUnprotected=nodes.filter(n=>{const c=COMPONENTS[n.type];if(c?.redteam||c?.blueteam)return false;return countNodeThreats(n)>0&&!(n.props.controls||[]).length;});
  if(strideUnprotected.length) findings.push({cls:'warn',icon:'🟡',title:`${strideUnprotected.length} component(s) have STRIDE threats but no controls attached`,detail:'Arm a Blue-Team tool (EDR, Firewall, etc.) and click these nodes to attach defensive shields and D3FEND coverage.',nodes:strideUnprotected,action:'Select first'});
  // Trust boundaries without D3FEND
  const undefTrust=trustB.filter(b=>!(b.d3fend||[]).length&&!nodesInside(b).some(n=>(n.props.d3fend||[]).length||(n.props.controls||[]).length));
  if(undefTrust.length) findings.push({cls:'warn',icon:'🟡',title:`${undefTrust.length} Trust Boundary(ies) with no defensive coverage inside`,detail:'Select the boundary, go to Properties, and map D3FEND countermeasures — or place Blue-Team controls inside the zone.',bnds:undefTrust,action:'Select first'});
  // Coverage > 80
  if(attackIds.length>0&&cov>=80) findings.push({cls:'ok',icon:'✅',title:`Good defensive coverage: ${cov}% signal`,detail:'Your D3FEND countermeasure count is well aligned with mapped ATT&CK techniques. Review residual risk per boundary.'});
  // Clean canvas
  if(!findings.length&&attackIds.length===0) findings.push({cls:'info',icon:'ℹ️',title:'No threat mappings yet',detail:'Select nodes and map ATT&CK / D3FEND techniques via the Properties tab to populate this analysis.'});

  // ── Build HTML ──
  const findingHtml=findings.map((f,i)=>`
    <div class="finding ${f.cls}">
      <b>${f.icon} ${esc(f.title)}</b>
      <div style="margin-top:4px;font-size:10.5px;opacity:.85">${f.detail||''}</div>
      ${f.nodes?.length?`<span class="find-act" data-sel-node="${f.nodes[0].id}">${f.action||'Select'} ↗</span>`:''}
      ${f.bnds?.length?`<span class="find-act" data-sel-bnd="${f.bnds[0].id}">${f.action||'Select'} ↗</span>`:''}
    </div>`).join('');

  const attackTechHtml=attackIds.length?attackIds.map(id=>`<div class="an-row" style="font-size:10px"><span><code>${id}</code> ${esc(attackMap[id].name)}</span><span style="color:var(--txt-2);font-size:9px">${esc(attackMap[id].sources.slice(0,2).join(', '))}</span></div>`).join(''):`<div style="color:var(--txt-2);font-size:10.5px">None mapped yet.</div>`;
  const defTechHtml=defIds.length?defIds.map(id=>`<div class="an-row" style="font-size:10px"><span><code>${id}</code> ${esc(defMap[id].name)}</span><span style="color:var(--txt-2);font-size:9px">${esc(defMap[id].sources.slice(0,2).join(', '))}</span></div>`).join(''):`<div style="color:var(--txt-2);font-size:10.5px">None mapped yet.</div>`;

  const strideRows=STRIDE.map(s=>{
    const cnt=tally[s.k].length, ua=unassessed[s.k].length, total=cnt+ua;
    const pct=total?Math.round(cnt/total*100):0;
    return `
    <div>
      <div class="an-row" style="margin-bottom:2px">
        <span><span class="ck-tag tag-${s.k}">${s.k}</span> ${s.name}</span>
        <span style="display:flex;align-items:center;gap:8px">
          <b style="color:${cnt?'var(--danger)':'var(--txt-2)'}">${cnt}</b>
          <button class="an-exp-btn" data-exp-toggle="stride-detail-${s.k}" title="Expand details"><span class="ec">▶</span></button>
        </span>
      </div>
      <div class="stride-bar"><div class="stride-bar-fill" style="width:${pct}%;background:var(--danger)"></div></div>
      <div id="stride-detail-${s.k}" style="display:none" class="an-detail">
        <div style="margin-bottom:3px;color:var(--txt-2)">${s.def}</div>
        <div style="color:var(--ok);font-size:10px;margin-bottom:6px">↳ ${s.mit}</div>
        ${cnt?`<div style="font-size:10px;color:var(--danger);margin-bottom:3px">Threats flagged (${cnt}):</div>${tally[s.k].map(n=>`<div class="an-row clickable" data-sel-node="${n.id}"><span>↳ ${esc(n.label)}</span></div>`).join('')}`:''}
        ${ua?`<div style="font-size:10px;color:var(--warn);margin-top:4px;margin-bottom:3px">Not yet assessed (${ua}):</div>${unassessed[s.k].map(n=>`<div class="an-row clickable" data-sel-node="${n.id}" style="opacity:.7"><span>↳ ${esc(n.label)}</span></div>`).join('')}`:''}
        ${!cnt&&!ua?`<div style="color:var(--txt-2)">Does not apply to any current component.</div>`:''}
      </div>
    </div>`;
  }).join('');

  const topExposed=nodes.slice().sort((a,b)=>countNodeThreats(b)-countNodeThreats(a)).filter(n=>countNodeThreats(n)>0).slice(0,8);

  const bndRows=bnds.map((b,i)=>{
    const sc=boundaryScore(b), rk=riskLevel(sc.residual);
    const inside=nodesInside(b);
    return `
    <div style="margin-bottom:6px;padding-bottom:8px;border-bottom:1px dashed var(--border)">
      <div class="an-row clickable" data-sel-bnd="${b.id}">
        <span style="font-weight:600">${esc(b.label)} <span style="font-size:9px;opacity:.6">(${sc.inside} nodes)</span></span>
        <span style="display:flex;align-items:center;gap:8px">
          <b style="color:${rk.c}">${rk.l}</b>
          <button class="an-exp-btn" data-exp-toggle="bnd-detail-${b.id}"><span class="ec">▶</span></button>
        </span>
      </div>
      ${scoreBar('⚔ Attack surface',sc.A,'var(--offense)')}
      ${scoreBar('🛡 Defense coverage',sc.D,'var(--trust)')}
      ${scoreBar('▲ Residual risk',sc.residual,rk.c)}
      <div id="bnd-detail-${b.id}" style="display:none" class="an-detail">
        <div class="an-row"><span>Attack vectors entering</span><b>${sc.off}</b></div>
        <div class="an-row"><span>Nodes inside</span><b>${sc.inside}</b></div>
        ${inside.length?inside.slice(0,6).map(n=>`<div class="an-row clickable" data-sel-node="${n.id}" style="font-size:10px"><span>↳ ${esc(n.label)}</span><span style="color:${COMPONENTS[n.type]?.redteam?'var(--offense)':COMPONENTS[n.type]?.blueteam?'var(--trust)':'var(--txt-2)'}">${COMPONENTS[n.type]?.redteam?'☠ red':''}${COMPONENTS[n.type]?.blueteam?'🛡 blue':''}</span></div>`).join(''):''}
        ${sc.residual>=75?`<div style="color:var(--danger);font-size:10px;margin-top:5px">⚠ Critical residual risk — add Blue-Team controls or D3FEND countermeasures inside this boundary.</div>`:''}
        ${sc.residual<25&&attackIds.length>0?`<div style="color:var(--ok);font-size:10px;margin-top:5px">✓ Well-defended boundary.</div>`:''}
      </div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="kpi">
      <div class="k"><div class="n" style="color:var(--accent-hi)">${nodes.length}</div><div class="l">Components</div></div>
      <div class="k"><div class="n" style="color:var(--cyan)">${edges.length}</div><div class="l">Data flows</div></div>
      <div class="k"><div class="n" style="color:var(--danger)">${threats}</div><div class="l">STRIDE threats</div></div>
      <div class="k"><div class="n" style="color:var(--offense)">${offensive}</div><div class="l">Attack vectors</div></div>
      <div class="k"><div class="n" style="color:var(--trust)">${trustB.length}</div><div class="l">Trust boundaries</div></div>
      <div class="k"><div class="n" style="color:var(--privacy)">${piiNodes.length}</div><div class="l">PII assets</div></div>
      <div class="k"><div class="n" style="color:var(--offense)">${rtNodes.length}</div><div class="l">Red-team infra</div></div>
      <div class="k"><div class="n" style="color:var(--trust)">${btNodes.length}</div><div class="l">Blue-team controls</div></div>
    </div>

    ${findings.length?`<div class="an-card"><h4>⚠️ Risk Findings <span class="pill">${findings.filter(f=>f.cls==='crit'||f.cls==='warn').length} issues</span></h4>${findingHtml}</div>`:''}

    <div class="an-card"><h4>⚔️ Offense ↔ Defense coverage</h4>
      <div style="height:10px;background:var(--bg-3);border-radius:6px;margin-bottom:6px;overflow:hidden;position:relative">

/* =====================================================================
   POINTER INTERACTION (place / drag / connect / pan / boundary resize)
   ===================================================================== */
let drag=null; // {mode, ...}
let moveGrab=null; // click-to-grab, click-to-place for boundaries & nodes
let freePath=null; // {points:[[x,y],...]} — active freehand drawing session

canvas.addEventListener('pointerdown',e=>{
  const w=screenToWorld(e.clientX,e.clientY);
  const nodeEl=e.target.closest('.node');
  const edgeEl=e.target.closest('.flow');
  const bndEl=e.target.closest('.boundary');
  const isResize=e.target.classList.contains('bnd-resize');

  // --- if we're in move-grab mode, second click places the element ---
  if(moveGrab){
    moveGrab=null; applyPiiZones(); renderAnalysis();
    return;
  }

  // --- placement of armed tool ---
  if(armed){
    const c=COMPONENTS[armed];
    if(c.blueteam){
      if(nodeEl){ applyControl(nodeEl.dataset.id, armed); }
      else { addNode(armed,w.x,w.y); }
      if(!e.shiftKey)disarm(); return;
    }
    if(c.kind==='node'){ addNode(armed,w.x,w.y); if(!e.shiftKey)disarm(); return; }
    if(c.kind==='boundary'){ addBoundary(c.bnd,w.x,w.y); if(!e.shiftKey)disarm(); return; }
    if(c.kind==='freehand'){
      if(!freePath){ freePath={points:[]}; }
      freePath.points.push([w.x,w.y]);
      renderFreePathPreview(w.x,w.y);
      return;
    }
    if(c.kind==='edge'||c.kind==='attack'||c.kind==='tunnel_off'||c.kind==='tunnel_def'){
      if(nodeEl){
        const id=nodeEl.dataset.id;
        if(!connectFrom){connectFrom=id; showHint('Now click the <b>target</b> node.'); }
        else{ addEdge(connectFrom,id,c.kind==='attack'||c.kind==='tunnel_off',c.kind==='tunnel_off'||c.kind==='tunnel_def'); connectFrom=null; showHint('Click next <b>source</b> node — or press <b>Esc</b> to stop.'); }
      }
      return;
    }
  }

  // --- resize boundary ---
  if(isResize&&selected&&selected.type==='boundary'){
    const b=byId(state.boundaries,selected.id);
    drag={mode:'resize',b,start:w}; canvas.setPointerCapture(e.pointerId); return;
  }
  // --- select + drag node ---
  if(nodeEl){
    const id=nodeEl.dataset.id; select('node',id);
    const n=nodeAt(id);
    drag={mode:'node',n,dx:w.x-n.x,dy:w.y-n.y,moved:false};
    canvas.setPointerCapture(e.pointerId); return;
  }
  // --- select edge ---
  if(edgeEl){ select('edge',edgeEl.dataset.id); return; }
  // --- select boundary: single click selects, double-click enters move-grab ---
  if(bndEl){
    const id=bndEl.dataset.id; select('boundary',id);
    const b=byId(state.boundaries,id);
    const bb=b.points?freehandBBox(b):b;
    // standard hold-drag also works
    const inside=b.locked!==false ? nodesInside(b) : [];
    drag={mode:'boundary',b,dx:w.x-bb.x,dy:w.y-bb.y,lastW:{x:w.x,y:w.y},inside,started:false,startW:{x:w.x,y:w.y}}; canvas.setPointerCapture(e.pointerId); return;
  }
  // --- pan / deselect ---
  select(null);
  drag={mode:'pan',sx:e.clientX,sy:e.clientY,vx:view.x,vy:view.y,moved:false};
  canvas.classList.add('panning'); canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove',e=>{
  const w=screenToWorld(e.clientX,e.clientY);
  // live temp line while connecting
  if(armed&&connectFrom&&(COMPONENTS[armed].kind==='edge'||COMPONENTS[armed].kind==='attack'||COMPONENTS[armed].kind==='tunnel_off'||COMPONENTS[armed].kind==='tunnel_def')){
    const a=nodeAt(connectFrom); if(a)drawTempLine(a.x,a.y,w.x,w.y);
  }
  // freehand preview
  if(freePath&&freePath.points.length>0){ renderFreePathPreview(w.x,w.y); }
  // click-to-grab mode: boundary follows cursor without button held
  if(moveGrab){
    const nx=snap(w.x-moveGrab.dx), ny=snap(w.y-moveGrab.dy);
    const ddx=nx-moveGrab.b.x, ddy=ny-moveGrab.b.y;
    moveGrab.b.x=nx; moveGrab.b.y=ny;
    moveGrab.inside.forEach(n=>{if(!n.free){n.x+=ddx; n.y+=ddy;}});
    renderBoundaries(); renderNodes(); renderEdges();
    return;
  }
  if(!drag)return;
  if(drag.mode==='node'){drag.n.x=drag.n.free?(w.x-drag.dx):snap(w.x-drag.dx); drag.n.y=drag.n.free?(w.y-drag.dy):snap(w.y-drag.dy); drag.moved=true; renderNodes(); renderEdges();}
  else if(drag.mode==='boundary'){
    // require 6px movement before starting drag (prevents accidental moves on click)
    if(!drag.started){
      if(Math.hypot(w.x-drag.startW.x, w.y-drag.startW.y)<6) return;
      drag.started=true;
    }
    if(drag.b.points){
      // freehand: translate all vertices by delta from last frame
      const ddx=w.x-drag.lastW.x, ddy=w.y-drag.lastW.y;
      drag.b.points.forEach(p=>{p[0]+=ddx; p[1]+=ddy;});
      drag.inside.forEach(n=>{if(!n.free){n.x+=ddx; n.y+=ddy;}});
      drag.lastW={x:w.x, y:w.y};
    } else {
      const nx=snap(w.x-drag.dx), ny=snap(w.y-drag.dy);
      const ddx=nx-drag.b.x, ddy=ny-drag.b.y;
      drag.b.x=nx; drag.b.y=ny;
      // move contained nodes together (free nodes stay in place)
      drag.inside.forEach(n=>{if(!n.free){n.x+=ddx; n.y+=ddy;}});
    }
    renderBoundaries(); renderNodes(); renderEdges(); applyPiiZones();
  }
  else if(drag.mode==='resize'){drag.b.w=Math.max(80,snap(w.x-drag.b.x)); drag.b.h=Math.max(60,snap(w.y-drag.b.y)); renderBoundaries(); applyPiiZones();}
  else if(drag.mode==='pan'){view.x=drag.vx+(e.clientX-drag.sx); view.y=drag.vy+(e.clientY-drag.sy); drag.moved=true; applyView();}
});

canvas.addEventListener('pointerup',e=>{
  if(drag){
    // If boundary was clicked without dragging → enter move-grab mode (click-to-place)
    if(drag.mode==='boundary'&&!drag.started&&!drag.b.points){
      const w=screenToWorld(e.clientX,e.clientY);
      const bb=drag.b.points?freehandBBox(drag.b):drag.b;
      moveGrab={b:drag.b, dx:w.x-bb.x, dy:w.y-bb.y, inside:drag.inside};
      showHint('Move boundary — <b>click</b> to place.');
      canvas.classList.remove('panning'); try{canvas.releasePointerCapture(e.pointerId);}catch(_){}
      drag=null; return;
    }
    if(drag.mode==='boundary'||drag.mode==='resize'){applyPiiZones(); renderNodes(); renderAnalysis(); schedSave();}
    if(drag.mode==='node'&&drag.moved) schedSave();
    canvas.classList.remove('panning'); try{canvas.releasePointerCapture(e.pointerId);}catch(_){}
  }
  drag=null;
});

// double-click a flow to toggle offensive; double-click a Kubernetes node to expand it; finalize freehand boundary
canvas.addEventListener('dblclick',e=>{
  // Finalize freehand polygon
  if(freePath){
    // dblclick fires after 2 pointerdown events — remove both bonus points
    if(freePath.points.length>0) freePath.points.pop();
    if(freePath.points.length>0) freePath.points.pop();
    if(freePath.points.length>=3){
      pushHistory();
      const b={id:uid('b'), type:'freehand', points:freePath.points, label:'Trust Boundary', d3fend:[], attack:[], notes:'', pii:false};
      state.boundaries.push(b); select('boundary',b.id);
    } else { toast('Need at least 3 points to close a boundary'); }
    freePath=null; clearTempLine(); disarm(); render(); schedSave();
    return;
  }
  const edgeEl=e.target.closest('.flow');
  if(edgeEl){const ed=byId(state.edges,edgeEl.dataset.id); ed.offensive=!ed.offensive; render(); toast(ed.offensive?'→ attack vector ⚔':'→ data flow'); return;}
  const nodeEl=e.target.closest('.node');
  if(nodeEl){const n=nodeAt(nodeEl.dataset.id); if(n&&n.type==='k8s')expandK8s(n);}
});
