function showCtxMenu(x,y,items){
  ctxMenu.innerHTML=items.map(it=>{
    if(it==='---')return '<div class="ctx-sep"></div>';
    return `<div class="ctx-item${it.danger?' danger':''}" data-action="${it.action}">
      <span>${it.icon||''} ${it.label}</span>${it.key?`<span class="ctx-key">${it.key}</span>`:''}
    </div>`;
  }).join('');
  ctxMenu.style.left=x+'px'; ctxMenu.style.top=y+'px';
  ctxMenu.classList.add('show');
  // ensure on screen
  const rect=ctxMenu.getBoundingClientRect();
  if(rect.right>window.innerWidth) ctxMenu.style.left=(x-rect.width)+'px';
  if(rect.bottom>window.innerHeight) ctxMenu.style.top=(y-rect.height)+'px';
  ctxMenu.onclick=e=>{
    const item=e.target.closest('.ctx-item'); if(!item)return;
    hideCtx();
    const act=item.dataset.action;
    if(ctxHandlers[act]) ctxHandlers[act]();
  };
}

const ctxHandlers={};

canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const nodeEl=e.target.closest('.node');
  const bndEl=e.target.closest('.boundary');
  const edgeEl=e.target.closest('.flow');
  const items=[];

  if(nodeEl){
    const n=nodeAt(nodeEl.dataset.id);
    if(!n)return;
    select('node',n.id);
    const c=COMPONENTS[n.type]||{};

    items.push({icon:'✏️', label:'Rename', action:'rename', key:'F2'});
    items.push({icon:'📋', label:'Duplicate', action:'duplicate'});
    items.push('---');

    // ── Semantic items based on component type ──
    const DATA_STORE_TYPES=new Set(['store','bucket','manageddb','cache','secret','configmap','pvc','pv','queue']);
    const PROCESS_TYPES=new Set(['process','webapp','mobileapp','api','serverless']);
    const IAM_TYPES=new Set(['iam','ad','iamrole','sa','rbac']);
    const K8S_WORKLOAD=new Set(['pod','k8s_node']);

    const strideToggle=(k)=>{
      const s=STRIDE.find(x=>x.k===k);
      const on=n.props.stride[k];
      items.push({icon:on?'✅':'⚠️', label:`${on?'Clear':'Flag'} ${s.k} — ${s.name}`, action:`stride_${k}`});
      ctxHandlers[`stride_${k}`]=()=>{ pushHistory(); n.props.stride[k]=!n.props.stride[k]; render(); schedSave(); toast(`${s.k} ${n.props.stride[k]?'flagged ⚠️':'cleared'} on ${n.label}`); };
    };

    if(DATA_STORE_TYPES.has(n.type)){
      items.push({icon:n.props.pii?'🔓':'🔒', label:n.props.pii?'Clear PII / sensitive flag':'Mark as PII / sensitive data', action:'toggle_pii'});
      ctxHandlers.toggle_pii=()=>{ pushHistory(); n.props.pii=!n.props.pii; render(); schedSave(); toast(n.props.pii?`${n.label} marked as PII 🔒`:`PII flag cleared`); };
      const enc=n.props.encryptedAtRest;
      items.push({icon:enc?'🔓':'🔐', label:enc?'Clear encrypted at rest':'Mark encrypted at rest', action:'toggle_enc_rest'});
      ctxHandlers.toggle_enc_rest=()=>{ pushHistory(); n.props.encryptedAtRest=!n.props.encryptedAtRest; renderInspector(); schedSave(); toast(n.props.encryptedAtRest?`${n.label} — encrypted at rest 🔐`:`Encryption at rest cleared`); };
      const cl=n.props.classification||'';
      const nextCl=CLASSIFICATION_LEVELS[(CLASSIFICATION_LEVELS.findIndex(l=>l.k===cl)+1)%CLASSIFICATION_LEVELS.length];
      items.push({icon:'📁', label:`Classification: ${cl?CLASSIFICATION_LEVELS.find(l=>l.k===cl).label:'Unclassified'} → cycle`, action:'cycle_class'});
      ctxHandlers.cycle_class=()=>{ pushHistory(); n.props.classification=nextCl.k; renderInspector(); schedSave(); toast(`Classification → ${nextCl.label}`); };
      strideToggle('I'); // Information Disclosure most relevant for stores
      strideToggle('T'); // Tampering
    } else if(n.type==='external'){
      strideToggle('S'); // Spoofing — canonical threat from external actors
      strideToggle('R'); // Repudiation
    } else if(IAM_TYPES.has(n.type)){
      strideToggle('E'); // Elevation of Privilege — primary IAM threat
      strideToggle('T'); // Tampering
      strideToggle('R'); // Repudiation
    } else if(PROCESS_TYPES.has(n.type)){
      const applies=(typeof STRIDE_APPLIES!=='undefined'&&STRIDE_APPLIES[n.type])||['S','T','R','I','D','E'];
      applies.slice(0,3).forEach(k=>strideToggle(k));
    } else if(K8S_WORKLOAD.has(n.type)){
      const priv=n.props.privileged;
      items.push({icon:priv?'🔓':'⚠️', label:priv?'Unmark privileged container':'Mark as privileged container', action:'toggle_priv'});
      ctxHandlers.toggle_priv=()=>{ pushHistory(); n.props.privileged=!n.props.privileged; render(); schedSave(); toast(`${n.label} ${n.props.privileged?'marked as privileged ⚠️':'privilege flag cleared'}`); };
      strideToggle('E');
    } else if(c.blueteam){
      const ctrls=n.props.controls||[];
      if(ctrls.length){
        items.push({icon:'🧹', label:`Clear all controls (${ctrls.length})`, action:'clear_controls'});
        ctxHandlers.clear_controls=()=>{ pushHistory(); n.props.controls=[]; render(); schedSave(); toast(`Controls cleared from ${n.label}`); };
      }
    }

    if(!c.redteam&&!c.blueteam){
      items.push({icon:n.props.internetExposed?'🔒':'🌐', label:n.props.internetExposed?'Remove internet exposure':'Mark as internet-exposed', action:'toggle_inet'});
      ctxHandlers.toggle_inet=()=>{pushHistory();n.props.internetExposed=!n.props.internetExposed;render();schedSave();toast(n.props.internetExposed?`${n.label} — internet-exposed 🌐`:`Internet exposure cleared`);};
      if(['external','api','cloud','iam','webapp','ad','siem','process','vm','firewall'].includes(n.type)){
        items.push({icon:n.props.mfa?'🔓':'🔑', label:n.props.mfa?'Remove MFA':'Enable MFA', action:'toggle_mfa'});
        ctxHandlers.toggle_mfa=()=>{pushHistory();toggleMFA(n);render();schedSave();toast(n.props.mfa?`${n.label} — MFA enabled 🔑`:`MFA removed`);};
      }
    }
    items.push('---');
    items.push({icon:'⚔️', label:'Toggle offensive flag', action:'toggle_off'});
    items.push('---');
    items.push({icon:'🗑️', label:'Delete', action:'delete', danger:true, key:'Del'});
    ctxHandlers.rename=()=>{const lbl=prompt('Rename node:',n.label); if(lbl!==null){n.label=lbl; render();}};
    ctxHandlers.duplicate=()=>{const dn=addNodeSilent(n.type,n.x+55,n.y+55);dn.label=n.label+' (copy)';render();toast('Node duplicated');};
    ctxHandlers.toggle_off=()=>{state.edges.filter(ed=>ed.from===n.id||ed.to===n.id).forEach(ed=>{ed.offensive=!ed.offensive;});render();};
    ctxHandlers.delete=()=>deleteSelected();
  } else if(bndEl){
    const b=byId(state.boundaries,bndEl.dataset.id);
    if(!b)return;
    select('boundary',b.id);
    const locked=b.locked!==false;
    items.push({icon:'✏️', label:'Rename', action:'rename', key:'F2'});
    items.push({icon:locked?'🔓':'🔒', label:locked?'Unlock group':'Lock group', action:'lock'});
    items.push({icon:'⊡', label:'Fit to contents', action:'fit'});
    items.push({icon:'◎', label:'Select all inside', action:'selectall'});
    items.push('---');
    items.push({icon:'🗑️', label:'Delete boundary', action:'delete', danger:true});
    ctxHandlers.rename=()=>{const lbl=prompt('Rename boundary:',b.label); if(lbl!==null){b.label=lbl; render();}};
    ctxHandlers.lock=()=>toggleLock(b);
    ctxHandlers.fit=()=>fitBoundaryToContents(b);
    ctxHandlers.selectall=()=>{const inside=nodesInside(b); toast(`${inside.length} node(s) inside ${b.label}`);};
    ctxHandlers.delete=()=>deleteSelected();
  } else if(edgeEl){
    const ed=byId(state.edges,edgeEl.dataset.id);
    if(!ed)return;
    select('edge',ed.id);
    items.push({icon:'✏️', label:'Rename flow', action:'rename'});
    items.push({icon:'⚔️', label:ed.offensive?'Make data flow':'Make attack vector', action:'toggle_off'});
    items.push({icon:'⇄', label:ed.bidirectional?'Make unidirectional':'Make bidirectional', action:'toggle_bidir'});
    items.push({icon:ed.encryptedInTransit?'🔓':'🔐', label:ed.encryptedInTransit?'Clear encrypted in transit':'Mark encrypted in transit', action:'toggle_enc_transit'});
    ctxHandlers.toggle_enc_transit=()=>{ pushHistory(); ed.encryptedInTransit=!ed.encryptedInTransit; renderInspector(); renderEdges(); schedSave(); toast(ed.encryptedInTransit?'Encrypted in Transit 🔐':'Encryption in transit cleared'); };
    items.push('---');
    items.push({icon:'🗑️', label:'Delete flow', action:'delete', danger:true});
    ctxHandlers.rename=()=>{const lbl=prompt('Flow label:',ed.label); if(lbl!==null){ed.label=lbl; render();}};
    ctxHandlers.toggle_off=()=>{ed.offensive=!ed.offensive; render(); toast(ed.offensive?'→ attack vector ⚔':'→ data flow');};
    ctxHandlers.toggle_bidir=()=>{ed.bidirectional=!ed.bidirectional; render(); toast(ed.bidirectional?'Bidirectional ⇄':'Unidirectional →');};
    ctxHandlers.delete=()=>deleteSelected();
  } else {
    // canvas context menu
    items.push({icon:'⊞', label:'Auto-arrange', action:'arrange'});
    items.push({icon:'⊡', label:'Fit view', action:'fitview'});
    items.push('---');
    items.push({icon:'🗑️', label:'Clear canvas', action:'clear', danger:true});
    ctxHandlers.arrange=()=>autoArrange();
    ctxHandlers.fitview=()=>fitView();
    ctxHandlers.clear=()=>clearCanvas();
  }

  showCtxMenu(e.clientX,e.clientY,items);
});

// zoom
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const old=view.k; const k=Math.min(2.6,Math.max(.25, old*(e.deltaY<0?1.12:0.89)));
  view.x = mx-(mx-view.x)*(k/old); view.y = my-(my-view.y)*(k/old); view.k=k; applyView();
},{passive:false});

document.getElementById('zoom-in').onclick=()=>zoomBy(1.18);
document.getElementById('zoom-out').onclick=()=>zoomBy(.85);
document.getElementById('zoom-fit').onclick=fitView;
function zoomBy(f){const r=canvas.getBoundingClientRect(),mx=r.width/2,my=r.height/2,old=view.k,k=Math.min(2.6,Math.max(.25,old*f));
  view.x=mx-(mx-view.x)*(k/old);view.y=my-(my-view.y)*(k/old);view.k=k;applyView();}
function fitView(){
  const all=[...state.nodes.map(n=>({x:n.x-R,y:n.y-R,w:2*R,h:2*R})),...state.boundaries];
  if(!all.length){view={x:0,y:0,k:1};applyView();return;}
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  all.forEach(o=>{minx=Math.min(minx,o.x);miny=Math.min(miny,o.y);maxx=Math.max(maxx,o.x+(o.w||0));maxy=Math.max(maxy,o.y+(o.h||0)+40);});
  const r=canvas.getBoundingClientRect(); const pad=80;
  const k=Math.min(1.4,Math.min((r.width-pad*2)/(maxx-minx||1),(r.height-pad*2)/(maxy-miny||1)));
  view.k=Math.max(.25,k);
  view.x=pad-minx*view.k+(r.width-pad*2-(maxx-minx)*view.k)/2;
  view.y=pad-miny*view.k+(r.height-pad*2-(maxy-miny)*view.k)/2;
  applyView();
}

// auto-flag PII for nodes inside privacy zones
function applyPiiZones(){
  const zones=state.boundaries.filter(b=>b.type==='privacy');
  state.nodes.forEach(n=>{
    const inside=zones.some(z=>n.x>z.x&&n.x<z.x+z.w&&n.y>z.y&&n.y<z.y+z.h);
    if(inside)n.props.pii=true;
  });
}

function deleteSelected(){
  if(!selected)return;
  pushHistory();
  if(selected.type==='node'){
    state.nodes=state.nodes.filter(n=>n.id!==selected.id);
    state.edges=state.edges.filter(e=>e.from!==selected.id&&e.to!==selected.id);
  }
  if(selected.type==='edge')state.edges=state.edges.filter(e=>e.id!==selected.id);
  if(selected.type==='boundary')state.boundaries=state.boundaries.filter(b=>b.id!==selected.id);
  select(null); render(); schedSave(); toast('Deleted');
}
window.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;
  if(e.key==='Escape'){
    moveGrab=null;
    if(freePath){
      if(freePath.points.length>=3){
        pushHistory();
        const b={id:uid('b'), type:'freehand', points:freePath.points, label:'Trust Boundary', d3fend:[], attack:[], notes:'', pii:false};
        state.boundaries.push(b); select('boundary',b.id); render(); schedSave();
        toast('Freehand boundary closed');
      }
      freePath=null; clearTempLine(); disarm();
    } else { disarm(); closeModal(); select(null); }
    return;
  }
  if((e.key==='Delete'||e.key==='Backspace')&&selected){e.preventDefault();deleteSelected();}
  if(e.ctrlKey&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  if(e.ctrlKey&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
});

function buildReport(){
  const d=new Date().toISOString().slice(0,10);
  let r=`# Skjaldborg Threat Model Report\n_Generated ${d} — Purple-Team Threat Modeling (STRIDE · PASTA · ATT&CK · D3FEND)_\n\n`;
  r+=`## 1. Scope (components)\n`;
  state.nodes.forEach(n=>{r+=`- **${n.label}** (${COMPONENTS[n.type].label})${n.props.pii?' 🔒 PII':''}${(n.props.controls||[]).length?` 🛡️[${n.props.controls.map(ct=>ct.label).join(', ')}]`:''}${n.props.notes?` — ${n.props.notes}`:''}\n`;});
  r+=`\n## 2. Data flows\n`;
  state.edges.forEach(e=>{const a=nodeAt(e.from),b=nodeAt(e.to);
    r+=`- ${a?a.label:'?'} ${e.bidirectional?'⇄':'→'} ${b?b.label:'?'}${e.label?` : ${e.label}`:''}${e.offensive?` ⚔️ **ATTACK VECTOR**`:''}${e.bidirectional?' ↔ **BIDIRECTIONAL**':''}`;
    if((e.attack||[]).length)r+=` [${e.attack.map(t=>t.id).join(', ')}]`; r+=`\n`;});
  r+=`\n## 3. Boundaries & zones\n`;
  state.boundaries.forEach(b=>{const cfg=BND[b.type]||BND.trust; r+=`- **${b.label}** — ${cfg.label}`;
    if(b.d3fend&&b.d3fend.length)r+=` D3FEND[${b.d3fend.map(t=>t.id).join(', ')}]`;
    if(b.attack&&b.attack.length)r+=` ATT&CK[${b.attack.map(t=>t.id).join(', ')}]`; r+=`\n`;});
  const rtN=state.nodes.filter(n=>COMPONENTS[n.type].redteam), btN=state.nodes.filter(n=>COMPONENTS[n.type].blueteam);
  if(rtN.length){r+=`\n### Red Team infrastructure\n`; rtN.forEach(n=>r+=`- ${n.label} (${COMPONENTS[n.type].label})${(n.props.attack||[]).length?` — ${n.props.attack.map(t=>t.id).join(', ')}`:''}\n`);}
  if(btN.length){r+=`\n### Blue Team defenses\n`; btN.forEach(n=>r+=`- ${n.label} (${COMPONENTS[n.type].label})${(n.props.d3fend||[]).length?` — ${n.props.d3fend.map(t=>t.id).join(', ')}`:''}\n`);}
  r+=`\n## 4. STRIDE assessment\n`;
  state.nodes.forEach(n=>{const ts=Object.entries(n.props.stride).filter(([,v])=>v).map(([k])=>k);
    if(ts.length){r+=`### ${n.label}\n`; ts.forEach(k=>{const s=STRIDE.find(x=>x.k===k);r+=`- **${s.k} ${s.name}** (${s.prop}) — mitigate: ${s.mit}\n`;});r+=`\n`;}});
  r+=`\n## 5. Offensive — MITRE ATT&CK\n`;
  const atk=new Map(); state.nodes.forEach(n=>(n.props.attack||[]).forEach(t=>atk.set(t.id,t.name))); state.edges.forEach(e=>(e.attack||[]).forEach(t=>atk.set(t.id,t.name))); state.boundaries.forEach(b=>(b.attack||[]).forEach(t=>atk.set(t.id,t.name)));
  atk.forEach((nm,id)=>r+=`- ${id} — ${nm}\n`); if(!atk.size)r+=`_None mapped._\n`;
  r+=`\n## 6. Defensive — MITRE D3FEND\n`;
  const def=new Map(); state.nodes.forEach(n=>(n.props.d3fend||[]).forEach(t=>def.set(t.id,t.name))); state.boundaries.forEach(b=>(b.d3fend||[]).forEach(t=>def.set(t.id,t.name))); state.nodes.forEach(n=>(n.props.controls||[]).forEach(ct=>ctrlD3(ct).forEach(t=>def.set(t.id,t.name))));
  def.forEach((nm,id)=>r+=`- ${id} — ${nm}\n`); if(!def.size)r+=`_None mapped._\n`;
  const pii=state.nodes.filter(n=>n.props.pii);
  r+=`\n## 7. Privacy (PII)\n`;
  if(pii.length)pii.forEach(n=>r+=`- ${n.label}\n`); else r+=`_No PII assets flagged._\n`;
  return r;
}

function exportSVG(){
  let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity;
  ['g-boundaries','g-edges','g-nodes'].forEach(id=>{
    const g=document.getElementById(id); if(!g||!g.children.length)return;
    try{const b=g.getBBox(); minx=Math.min(minx,b.x); miny=Math.min(miny,b.y); maxx=Math.max(maxx,b.x+b.width); maxy=Math.max(maxy,b.y+b.height);}catch(_){}
  });
  if(!isFinite(minx)){toast('Nothing to export'); return;}

  const pad=80;
  const dX=minx-pad, dY=miny-pad, dW=maxx-minx+pad*2, dH=maxy-miny+pad*2;

  // --- Collect analysis data ---
  const atkMap=new Map(), defMap=new Map();
  state.nodes.forEach(n=>{
    (n.props.attack||[]).forEach(t=>atkMap.set(t.id,t.name));
    (n.props.d3fend||[]).forEach(t=>defMap.set(t.id,t.name));
    (n.props.controls||[]).forEach(ct=>ctrlD3(ct).forEach(t=>defMap.set(t.id,t.name)));
  });
  state.edges.forEach(e=>(e.attack||[]).forEach(t=>atkMap.set(t.id,t.name)));
  state.boundaries.forEach(b=>{
    (b.attack||[]).forEach(t=>atkMap.set(t.id,t.name));
    (b.d3fend||[]).forEach(t=>defMap.set(t.id,t.name));
  });
  const strideCounts={S:0,T:0,R:0,I:0,D:0,E:0};
  state.nodes.forEach(n=>Object.entries(n.props.stride||{}).forEach(([k,v])=>{if(v)strideCounts[k]=(strideCounts[k]||0)+1;}));
  const classCounts={};
  state.nodes.forEach(n=>{if(n.props.classification)classCounts[n.props.classification]=(classCounts[n.props.classification]||0)+1;});
  const piiNodes=state.nodes.filter(n=>n.props.pii);
  const rtNodes=state.nodes.filter(n=>(COMPONENTS[n.type]||{}).redteam);
  const btNodes=state.nodes.filter(n=>(COMPONENTS[n.type]||{}).blueteam);
  const encTransitCount=state.edges.filter(e=>e.encryptedInTransit).length;
  const encRestCount=state.nodes.filter(n=>n.props.encryptedAtRest).length;
  function safeStr(s){return s.replace(/[^\x00-\xFF]/g,'').trim();}

  // --- SVG helpers ---
  const PW=400, PG=50, PP=16;
  const fam="'JetBrains Mono',Consolas,monospace";
  const pX=dX+dW+PG, pY=dY;
  function svgt(x,y,content,sz,fill,weight='normal',anchor='start'){
    return `<text x="${x}" y="${y}" font-size="${sz}" fill="${fill}" font-weight="${weight}" text-anchor="${anchor}" font-family="${fam}">${content}</text>`;
  }
  function sHdr(y,label,color){
    return svgt(pX+PP,y,label,9,color,'bold')+
      `<line x1="${pX+PP}" y1="${y+4}" x2="${pX+PW-PP}" y2="${y+4}" stroke="${color}" stroke-width=".5" opacity=".4"/>`;
  }
  function sBar(x,y,val,color,label,bw){
    const f=Math.round(bw*Math.min(100,Math.max(0,val))/100);
    return svgt(x,y,label,9,'#b0b0cc')+
      `<rect x="${x+100}" y="${y-9}" width="${bw}" height="7" fill="#1a1a24" rx="2"/>` +
      `<rect x="${x+100}" y="${y-9}" width="${f}" height="7" fill="${color}" rx="2" opacity=".8"/>` +
      svgt(x+100+bw+5,y,val+'%',8,color);
  }

  // --- Build panel content ---
  let pc=''; let cy=pY+PP;
  cy+=18;
  pc+=svgt(pX+PP,cy,'THREAT ANALYSIS REPORT',14,'#e0e0ec','bold');
  cy+=15;
  pc+=svgt(pX+PP,cy,esc(state.name||'Unnamed Model'),10,'#aaaacc');
  cy+=8;
  pc+=`<line x1="${pX+PP}" y1="${cy}" x2="${pX+PW-PP}" y2="${cy}" stroke="#2a2a3a" stroke-width="1"/>`;
  cy+=16;

  pc+=sHdr(cy,'Summary','#a855f7'); cy+=18;
  for(const [lbl,val] of [
    ['Nodes',state.nodes.length],['Edges',state.edges.length],['Boundaries',state.boundaries.length],
    ['ATT&amp;CK techniques',atkMap.size],['D3FEND techniques',defMap.size],
    ['Red team nodes',rtNodes.length],['Blue team controls',btNodes.length],
    ['Encrypted flows',encTransitCount],['Encrypted at rest',encRestCount],
  ]){
    pc+=svgt(pX+PP,cy,lbl,9,'#b0b0cc');
    pc+=svgt(pX+PW-PP,cy,String(val),9,'#e8e8f8','bold','end');
    cy+=13;
  }
  cy+=8;

  pc+=sHdr(cy,'STRIDE Threat Analysis','#38bdf8'); cy+=18;
  const strideInfo={S:{n:'Spoofing',c:'#ef4444'},T:{n:'Tampering',c:'#f97316'},R:{n:'Repudiation',c:'#eab308'},I:{n:'Info Disclosure',c:'#a855f7'},D:{n:'Denial of Service',c:'#38bdf8'},E:{n:'Elevation of Priv.',c:'#ff6b6b'}};
  const totalN=Math.max(1,state.nodes.length);
  const bw=PW-PP*2-110;
  for(const [k,info] of Object.entries(strideInfo)){
    const cnt=strideCounts[k]||0;

    pc+=svgt(pX+PP+100+bw+36,cy,`${cnt}/${totalN}`,8,'#9090b0');
    cy+=16;
  }
  cy+=8;

  const classLevels=CLASSIFICATION_LEVELS.filter(cl=>cl.k&&classCounts[cl.k]);
  if(classLevels.length||piiNodes.length){
    pc+=sHdr(cy,'Data Classification','#22c55e'); cy+=18;
    for(const cl of classLevels){
      pc+=svgt(pX+PP,cy,safeStr(cl.label)+':',9,'#c0c0dc');
      pc+=svgt(pX+PW-PP,cy,classCounts[cl.k]+' node(s)',9,cl.color||'#e8e8f8','bold','end');
      cy+=13;
    }
    if(piiNodes.length){
      pc+=svgt(pX+PP,cy,'PII assets: '+piiNodes.length,9,'#f59e0b','bold');

    }

  }

  if(atkMap.size){
    pc+=sHdr(cy,'MITRE ATT&amp;CK Techniques ('+atkMap.size+')','#ef4444'); cy+=18;
    let i=0;
    for(const [id,nm] of atkMap){

    }

    let i=0;
    for(const [id,nm] of defMap){

      pc+=svgt(pX+PP+85,cy,esc(nm.substring(0,32)),9,'#e8e8f8');
      cy+=13; i++;
      if(i>=14&&defMap.size>15){pc+=svgt(pX+PP,cy,'... and '+(defMap.size-14)+' more',8,'#9090b8'); cy+=13; break;}
    }
    cy+=8;
  }

  if(rtNodes.length){
    pc+=sHdr(cy,'Red Team OpSec Assessment','#ff6b6b'); cy+=18;
    let cnt=0;

      if(cnt>=12){pc+=svgt(pX+PP,cy,'... and '+(rtNodes.length-12)+' more',8,'#9090b8'); cy+=13; break;}

function importJSON(file){const rd=new FileReader();rd.onload=()=>{try{const o=JSON.parse(rd.result);state=o.state||o;select(null);render();fitView();pushHistory();schedSave();toast('Model imported');}catch(_){toast('Invalid file');}};rd.readAsText(file);}
function download(name,content,mime){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));a.download=name;a.click();}
function clearCanvas(){if(state.nodes.length||state.boundaries.length){if(!confirm('Clear the entire canvas?'))return;}pushHistory();state={nodes:[],edges:[],boundaries:[],seq:1};select(null);render();schedSave();toast('Canvas cleared');}

<h3>Threat Modeling Frameworks</h3>
<p>PurpleSkjaldborg integrates four industry-standard frameworks into a unified canvas workflow.</p>

<h3>STRIDE</h3>
<p>Categorizes threats by the security property they violate. Each element type (External Entity, Process, Data Store, Data Flow) is susceptible to specific STRIDE categories:</p>
<table>
  <thead><tr><th>Category</th><th>Violates</th><th>Mitigation Direction</th><th>Applies To</th></tr></thead>
  <tbody>
    <tr><td><b>S</b>poofing</td><td>Authentication</td><td>Strong identity verification</td><td>External Entity, Process</td></tr>
    <tr><td><b>T</b>ampering</td><td>Integrity</td><td>Integrity checks, signing</td><td>Process, Data Store, Data Flow</td></tr>
    <tr><td><b>R</b>epudiation</td><td>Non-repudiation</td><td>Audit logging, signatures</td><td>External Entity, Process</td></tr>
    <tr><td><b>I</b>nformation Disclosure</td><td>Confidentiality</td><td>Encryption, access control</td><td>Process, Data Store, Data Flow</td></tr>
    <tr><td><b>D</b>enial of Service</td><td>Availability</td><td>Rate limiting, redundancy</td><td>Process, Data Store, Data Flow</td></tr>
    <tr><td><b>E</b>levation of Privilege</td><td>Authorization</td><td>Least privilege, sandboxing</td><td>Process</td></tr>
  </tbody>
</table>
<p>Use the STRIDE checkboxes in the inspector to mark which threats apply to each node. Click the <b>STRIDE</b> toolbar button for the full matrix view.</p>

<h3>PASTA (Process for Attack Simulation &amp; Threat Analysis)</h3>
<p>A risk-centric, 7-stage methodology. Each stage maps to Skjaldborg constructs:</p>
<table>
  <thead><tr><th>#</th><th>Stage</th><th>Skjaldborg Mapping</th></tr></thead>
  <tbody>
    <tr><td>1</td><td>Define Objectives</td><td>Scope &rarr; boundaries + zone labels</td></tr>
    <tr><td>2</td><td>Define Technical Scope</td><td>Place nodes for all assets &amp; infra</td></tr>
    <tr><td>3</td><td>Application Decomposition</td><td>Draw data flows between components</td></tr>
    <tr><td>4</td><td>Threat Analysis</td><td>Mark STRIDE categories + add notes</td></tr>
    <tr><td>5</td><td>Vulnerability Analysis</td><td>Map ATT&CK techniques to attack edges</td></tr>
    <tr><td>6</td><td>Attack Modeling</td><td>Red team infra + offensive tunnels + chains</td></tr>
    <tr><td>7</td><td>Risk &amp; Impact</td><td>D3FEND countermeasures + residual risk score</td></tr>
  </tbody>
</table>

<h3>MITRE ATT&CK</h3>
<p>Maps adversary <b>tactics, techniques, and procedures</b> (TTPs) to offensive elements. Pre-populated for Red Team nodes:</p>
<div class="two-col">
  <div class="card"><h4>Tactics Coverage</h4>
    <p>Initial Access, Execution, Persistence, Privilege Escalation, Defense Evasion, Credential Access, Discovery, Lateral Movement, Collection, Exfiltration, Command &amp; Control, Impact</p></div>
  <div class="card"><h4>Auto-Mapped Examples</h4>
    <p><code>T1566</code> Phishing (EvilGinx2)<br><code>T1071</code> Application Layer Protocol (C2)<br><code>T1572</code> Protocol Tunneling (Ligolo-ng)<br><code>T1059</code> Command &amp; Scripting (LOLBins)<br><code>T1003</code> OS Credential Dumping (DCSync)</p></div>
</div>
<p>Assign ATT&CK IDs via the inspector's ATT&CK tab, or they auto-populate based on node type.</p>

<h3>MITRE D3FEND</h3>
<p>Maps <b>defensive countermeasures</b> to blue team controls. D3FEND techniques are auto-attached when you shield a node:</p>
<div class="two-col">
  <div class="card"><h4>Countermeasure Categories</h4>
    <p>Network Isolation, File Analysis, Process Analysis, Credential Hardening, Application Hardening, Message Analysis, Platform Monitoring, User Behavior Analysis</p></div>
  <div class="card"><h4>Auto-Mapped Examples</h4>
    <p><code>D3-NI</code> Network Isolation (pfSense)<br><code>D3-FA</code> File Analysis (CrowdStrike)<br><code>D3-PA</code> Process Analysis (Sysmon)<br><code>D3-CH</code> Credential Hardening (MFA)<br><code>D3-PM</code> Platform Monitoring (Darktrace)</p></div>
</div>

<h3>Risk Scoring</h3>
<p>The Analysis tab calculates <b>residual risk</b> per boundary:</p>
<ul>
  <li><b>Attack Score:</b> Sum of ATT&CK techniques on offensive edges entering the boundary</li>
  <li><b>Defense Score:</b> Sum of D3FEND countermeasures on nodes/controls within the boundary</li>
  <li><b>Residual Risk:</b> Attack minus Defense — positive means under-defended, negative means well-covered</li>
</ul>

<h3>Further Reading</h3>
<div class="hl"><p>For a deep-dive into threat modeling culture, STRIDE/PASTA theory, and how these frameworks fit into modern engineering workflows, see:<br><a href="https://benjitrapp.github.io/cultures/2022-06-11-threat-modeling/" target="_blank" rel="noopener" style="color:var(--accent-hi)">benjitrapp.github.io &mdash; Threat Modeling (Culture &amp; Practice)</a></p></div>

workflow:`
<h3>Recommended Workflow</h3>
<p>Follow this step-by-step process to build a complete threat model:</p>

<h3>Step 1: Define the Scope</h3>
<ul>
  <li>Place <b>boundaries</b> for your architecture zones (Corporate, DMZ, Cloud, K8s cluster, etc.)</li>
  <li>Use a <b>Freehand Boundary</b> to draw irregular perimeters that match your real topology — click vertices, press <span class="kb">Esc</span> to finalize.</li>
  <li>Add a <b>PII zone</b> (green) if you have GDPR/privacy-sensitive data assets</li>
  <li>Consider adding a <b>Grey Zone</b> for attacker staging infrastructure</li>
</ul>

<h3>Step 2: Place &amp; Classify Assets</h3>
<ul>
  <li>Drop infrastructure nodes: AD, DNS, web servers, databases, K8s clusters</li>
  <li>Place them <b>inside</b> their respective boundaries</li>
  <li>Label each node clearly (e.g., "DC01", "prod-api", "customer-db")</li>
  <li>For data stores: open the inspector and set the <b>📁 Data Classification</b> — level (Public / Internal / Confidential / Restricted / Secret), data categories (PII, PHI, PCI, Biometric…), and <b>🔐 Encrypted at Rest</b></li>
  <li>Mark stores with the <b>PII flag</b> — they automatically appear in the PII zone</li>
  <li>Use <span class="kb">Right-click</span> → <em>Mark as PII</em> or <em>Cycle classification</em> for quick edits</li>
</ul>

<h3>Step 3: Draw Data Flows</h3>
<ul>
  <li>Select the <b>Data Flow</b> tool — it stays armed so you can wire multiple flows in a row. Press <span class="kb">Esc</span> when done.</li>
  <li>Label flows with protocol/data type (e.g., "LDAP auth", "TLS 1.3", "SQL queries")</li>
  <li>Toggle <b>🔐 Encrypted in Transit</b> in the inspector (or right-click the edge) for each encrypted channel — a 🔐 badge appears on the canvas</li>
  <li>Mark flows that cross boundaries — these are key trust boundary crossings</li>
</ul>

<h3>Step 4: Model the Attacker</h3>
<ul>
  <li>Place Red Team infrastructure (C2 server, phishing platform) in a <b>Red Team</b> or <b>Grey Zone</b> boundary</li>
  <li>Draw <b>attack vectors</b> (red edges) showing the attack path — tool stays armed for rapid chaining</li>
  <li>Use <b>tunnel edges</b> for pivot/C2 channels (animated red glow)</li>
  <li>Map <b>ATT&CK techniques</b> to each attack edge — click the technique ID chip to open the MITRE page</li>
  <li>Add <b>LOLBin</b> / <b>pivot</b> nodes at each lateral movement point</li>
</ul>

<h3>Step 5: Deploy Defenses</h3>
<ul>
  <li>Arm Blue Team tools and <b>click on assets</b> to shield them (D3FEND countermeasures auto-attach)</li>
  <li>Add defensive boundaries (trust boundaries with D3FEND mappings)</li>
  <li>Use <b>right-click → STRIDE flags</b> on nodes to mark threats relevant to each component type</li>
  <li>Consider <b>defense-in-depth</b>: multiple shields per critical asset</li>
</ul>

<h3>Step 6: Analyze &amp; Report</h3>
<ul>
  <li>Click <b>Arrange</b> to auto-layout nodes into semantic zones (K8s, Cloud, Red Team, Blue Team, etc.)</li>
  <li>Open the <b>Analysis</b> tab to see per-boundary risk scores</li>
  <li>Run the <b>STRIDE</b> matrix to check coverage</li>
  <li>Click <b>Report</b> to generate a full threat model document</li>
  <li>Click <b>🖼 SVG</b> to export the diagram as a standalone image (embeds font, resolves colors)</li>
  <li>Click <b>Save</b> to export JSON for persistence and team sharing</li>
</ul>

<div class="hl"><p><b>Pro tip:</b> Load a <b>Sample Scenario</b> to see a complete workflow example, then modify it for your environment.</p></div>

<h3>Sample Scenarios</h3>
<p>The built-in library includes 5 pre-built scenarios you can load and modify:</p>
<table>
  <thead><tr><th>Scenario</th><th>Focus</th><th>Key Techniques</th></tr></thead>
  <tbody>
    <tr><td><b>AD Attack Chain</b></td><td>On-prem Active Directory</td><td>Kerberoasting, DCSync, Golden Ticket</td></tr>
    <tr><td><b>K8s Cluster Compromise</b></td><td>Container orchestration</td><td>Pod escape, RBAC abuse, etcd dump</td></tr>
    <tr><td><b>Cloud Identity Breach</b></td><td>Azure AD / Entra ID</td><td>Token theft, consent phishing, MFA bypass</td></tr>
    <tr><td><b>Supply Chain Attack</b></td><td>CI/CD + Cloud</td><td>Pipeline poisoning, IRSA abuse, registry tampering</td></tr>
    <tr><td><b>Ransomware (Double Extortion)</b></td><td>Full kill chain</td><td>RDP brute → Cobalt Strike → DCSync → data exfil → GPO deploy</td></tr>
  </tbody>
</table>

about:`
<div style="text-align:center;padding:18px 0 10px">
  <img src="static/logo_transparent.png" alt="Skjaldborg" style="height:80px;object-fit:contain;filter:drop-shadow(0 0 18px #a855f760)">
  <div style="margin-top:10px;font-size:20px;font-weight:700;letter-spacing:.5px;color:var(--txt-0)">Skjald<span style="color:var(--accent)">borg</span></div>
  <div style="font-size:10px;color:var(--txt-2);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px">Purple-Team Threat Modeling</div>
</div>
<p style="text-align:center;font-size:11.5px;color:var(--txt-1);margin:0 auto 18px"><em>"Skjaldborg"</em> — Old Norse for <em>shield wall</em>, the defensive formation where interlocked shields protect against attackers.<br>Build your digital shield wall.</p>
<p><b>PurpleSkjaldborg</b> is a browser-based, zero-dependency threat modeling tool designed for purple teams, security architects, and penetration testers who want to visualize attack paths alongside defensive controls.</p>

<div class="two-col">
  <div class="card"><h4>Design Principles</h4>
    <ul>
      <li>Single HTML file — no build step, no server, works offline</li>
      <li>Purple team focus: offense <em>and</em> defense in one view</li>
      <li>Framework integration: STRIDE + PASTA + ATT&CK + D3FEND</li>
      <li>Visual-first: animated tunnels, force-field boundaries, shield badges</li>
      <li>Export-ready: JSON · Markdown reports · SVG diagram image</li>
    </ul>
  </div>
  <div class="card"><h4>What Makes It Different</h4>
    <ul>
      <li>Attack paths and defenses modeled <em>together</em> on one canvas</li>
      <li>Blue team tools as shields <em>on</em> assets, not floating boxes</li>
      <li>Residual risk scoring: attack surface minus countermeasures</li>
      <li>Pre-built Red/Blue component libraries with auto-ATT&CK/D3FEND</li>
      <li>Data classification + encryption status per store — not just a checkbox</li>
      <li>Clickable MITRE IDs linking directly to the official knowledge base</li>
      <li>Sample kill chains you can adapt for your environment</li>
    </ul>
  </div>
</div>

<h3>Architecture</h3>
<ul>
  <li><b>Rendering:</b> SVG canvas with layers (boundaries → edges → nodes)</li>
  <li><b>State:</b> In-memory JSON (nodes, edges, boundaries). Export/import for persistence.</li>
  <li><b>Components:</b> Each node type has an icon, role, default ATT&CK/D3FEND mappings, STRIDE applicability, and data classification metadata (for store types).</li>
  <li><b>Edges:</b> Data flows (blue) or attack vectors (red), with optional tunnel animation, bidirectional markers, and encrypted-in-transit flag (🔐 badge on canvas).</li>
  <li><b>Boundaries:</b> Rectangular zones with force-field styling, or freehand polygons (Catmull-Rom smoothed, open path). Types: trust, privacy, cloud, network, red team, grey zone, namespace, NetworkPolicy, freehand.</li>
  <li><b>Auto-arrange:</b> Semantic zone layout — 10 zones including K8s cluster, Red Team, Grey Zone, Pivot, Blue Team, IAM.</li>
  <li><b>SVG export:</b> Measures content bbox, removes grid, resolves CSS variables, embeds font — produces a standalone image.</li>
</ul>

<h3>Color Key</h3>
<div style="margin:10px 0">
  <div class="color-key"><span class="dot" style="background:var(--offense)"></span> <b>Red</b> — Offensive / attack vectors / Red Team infrastructure</div>
  <div class="color-key"><span class="dot" style="background:var(--trust)"></span> <b>Cyan/Blue</b> — Defensive / trust boundaries / Blue Team controls / encrypted channels</div>
  <div class="color-key"><span class="dot" style="background:var(--privacy)"></span> <b>Green</b> — PII/Privacy zones / GDPR-relevant data / encryption indicators</div>
  <div class="color-key"><span class="dot" style="background:var(--accent)"></span> <b>Purple</b> — UI accents / selected elements / Skjaldborg brand</div>
  <div class="color-key"><span class="dot" style="background:#c41e3a"></span> <b>Dark Red</b> — Freehand trust boundaries (classical threat model style)</div>
  <div class="color-key"><span class="dot" style="background:#888"></span> <b>Grey</b> — Neutral data flows / infrastructure / Grey Zone staging</div>
</div>

<h3>Tips &amp; Best Practices</h3>
<ul>
  <li>Start with boundaries to define your architecture before placing nodes</li>
  <li>Use <b>Freehand Boundary</b> for organic perimeters that don't fit a rectangle</li>
  <li>Use <b>Auto Arrange</b> after building your model — it places every node into the correct semantic zone automatically</li>
  <li>Set data classification and encryption status on all stores — it shows up in the Markdown report</li>
  <li>Click any ATT&CK / D3FEND ID chip to open the MITRE reference page directly</li>
  <li>Flow tools stay armed — draw all your flows in one pass, then press Esc</li>
  <li>Map ATT&CK on attack edges for the report to auto-generate a technique matrix</li>
  <li>Add D3FEND countermeasures on nodes/boundaries to calculate residual risk</li>
  <li>Export frequently — the tool runs entirely in-browser with no server-side save</li>
  <li>Use <b>SVG export</b> to embed diagrams in docs, wikis, or slide decks</li>
</ul>

<h3>Acknowledgements &amp; References</h3>
<p>Built with inspiration from Microsoft Threat Modeling Tool, OWASP Threat Dragon, and the MITRE ATT&CK/D3FEND knowledge bases. Visual design influenced by cyberpunk/sci-fi HUD aesthetics.</p>
<ul>
  <li><a href="https://benjitrapp.github.io/cultures/2022-06-11-threat-modeling/" target="_blank" rel="noopener" style="color:var(--accent-hi)">Threat Modeling — Culture &amp; Practice</a> — foundational concepts on STRIDE, PASTA, and integrating threat modeling into engineering culture</li>
  <li><a href="https://attack.mitre.org/" target="_blank" rel="noopener" style="color:var(--accent-hi)">MITRE ATT&CK</a> — adversary tactics &amp; techniques knowledge base</li>

</ul>
<p style="color:var(--txt-2);font-size:11px;margin-top:20px">PurpleSkjaldborg &middot; Purple-Team Threat Modeling &middot; Zero Dependencies &middot; MIT License</p>
`

function openHelp(tab){
  const ov=document.getElementById('help-overlay');
  ov.classList.add('show');
  setHelpTab(tab||'tutorial');
}
function closeHelp(){document.getElementById('help-overlay').classList.remove('show');}
function setHelpTab(tab){
  document.querySelectorAll('.help-tabs button').forEach(b=>{b.classList.toggle('active',b.dataset.htab===tab);});
  document.getElementById('help-body').innerHTML=HELP_CONTENT[tab]||'';
}
document.getElementById('help-close').onclick=closeHelp;
document.querySelectorAll('.help-tabs button').forEach(b=>b.onclick=()=>setHelpTab(b.dataset.htab));
document.getElementById('btn-help').onclick=()=>openHelp();
document.getElementById('help-overlay').addEventListener('keydown',e=>{if(e.key==='Escape')closeHelp();});
document.addEventListener('keydown',e=>{
  if(e.key==='?'&&!e.ctrlKey&&!e.altKey&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){
    const ov=document.getElementById('help-overlay');
    if(ov.classList.contains('show'))closeHelp(); else openHelp();
  }
});

/* =====================================================================
   INSPECTOR RESIZE
   ===================================================================== */
(function(){
  const insp=document.getElementById('inspector');
  const rz=document.getElementById('insp-resizer');
  const MIN_W=220, MAX_W=680;
  const saved=localStorage.getItem('insp_width');
  if(saved){const w=parseInt(saved,10);if(w>=MIN_W&&w<=MAX_W){insp.style.width=w+'px';}}
  let drag=null;
  rz.addEventListener('mousedown',e=>{
    drag={startX:e.clientX,startW:insp.offsetWidth};
    rz.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const w=Math.min(MAX_W,Math.max(MIN_W,drag.startW-(e.clientX-drag.startX)));
    insp.style.width=w+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!drag)return;
    localStorage.setItem('insp_width',insp.offsetWidth);
    rz.classList.remove('dragging');
    document.body.style.cursor='';
    document.body.style.userSelect='';
    drag=null;
  });
})();

/* =====================================================================
   BOOT
   ===================================================================== */
buildPalette(); initCanvas();
if(loadFromLS()){
  render(); fitView(); pushHistory(); toast('Session restored from browser storage 💾');
} else {
  state={nodes:[],edges:[],boundaries:[],seq:1}; render(); pushHistory();
}
_updateUndoRedo();
</script>
</body>
</html>
